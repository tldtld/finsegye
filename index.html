<script>
// [1] 공통 저장 및 화면 갱신 함수 (나의 현황 연동 핵심)
function saveAndRefresh(key, data) {
    let list = JSON.parse(localStorage.getItem(key) || '[]');
    data.date = new Date().toLocaleString();
    list.unshift(data);
    localStorage.setItem(key, JSON.stringify(list));
    forceUpdateAll(); // 저장 즉시 나의 현황 갱신
}

// [2] 화면 전환 함수 (자판기 가림막 포함)
function showSection(sectionId, btn) {
    document.querySelectorAll('section').forEach(s => s.style.display = 'none');
    document.querySelectorAll('.nav button').forEach(b => b.classList.remove('active'));

    const target = document.getElementById(sectionId);
    if(target) target.style.display = 'block';
    if(btn) btn.classList.add('active');

    if(sectionId === 'mypage') {
        forceUpdateAll();
    }
    window.scrollTo(0, 0);
}

// [3] 행사 신청 저장 (4칸 철벽 검증)
function submitAd() {
    const shop = document.getElementById('shopName');
    const biz = document.getElementById('bizType');
    const area = document.getElementById('area');
    const text = document.getElementById('adText');

    if(!shop.value.trim()) { alert("상호명을 입력하세요."); shop.focus(); return; }
    if(!biz.value.trim()) { alert("업종/업태를 입력하세요."); biz.focus(); return; }
    if(!area.value.trim()) { alert("행사지역을 입력하세요."); area.focus(); return; }
    if(!text.value.trim()) { alert("행사문구를 입력하세요."); text.focus(); return; }

    saveAndRefresh('fin_ads', { title: shop.value, detail: biz.value + " | " + area.value });
    alert("📩 [" + shop.value + "] 신청 완료!");
    
    shop.value = ""; biz.value = ""; area.value = ""; text.value = "";
    showSection('dashboard', document.getElementById('btn-dashboard'));
}

// [4] 공유 신청 저장 (3칸 철벽 검증)
function submitLoan() {
    const name = document.getElementById('loanName');
    const amount = document.getElementById('loanAmount');
    const purpose = document.getElementById('loanPurpose');

    if(!name.value.trim()) { alert("신청자명을 입력하세요."); name.focus(); return; }
    if(!amount.value || amount.value <= 0) { alert("신청금액을 정확히 입력하세요."); amount.focus(); return; }
    if(!purpose.value.trim()) { alert("공유목적을 입력하세요."); purpose.focus(); return; }

    saveAndRefresh('fin_loans', { title: name.value + " (" + amount.value + "만원)" });
    alert("💰 공유 신청 완료!");
    
    name.value = ""; amount.value = ""; purpose.value = "";
    showSection('dashboard', document.getElementById('btn-dashboard'));
}

// [5] 행사 루틴 저장 (3칸 철벽 검증)
function submitRoutine() {
    const owner = document.getElementById('routineOwner');
    const region = document.getElementById('routineRegion');
    const text = document.getElementById('routineText');

    if(!owner.value.trim()) { alert("제작자 이름을 입력하세요."); owner.focus(); return; }
    if(!region.value.trim()) { alert("적용지역을 입력하세요."); region.focus(); return; }
    if(!text.value.trim()) { alert("루틴 내용을 입력하세요."); text.focus(); return; }

    saveAndRefresh('fin_routines', { title: owner.value + "님의 루틴" });
    alert("🌀 루틴 생성 완료!");
    
    owner.value = ""; region.value = ""; text.value = "";
    showSection('dashboard', document.getElementById('btn-dashboard'));
}

// [6] AI 지갑 설립 완료 (동의체크 포함 검증)
function submitBank() {
    const name = document.getElementById('bankName');
    const phone = document.getElementById('bankPhone');
    const address = document.getElementById('bankAddress');
    const agree = document.getElementById('bankAgree');
    const refInput = document.getElementById('bankReferrer');

    if (!name.value.trim()) { alert("성함을 입력해주세요."); name.focus(); return; }
    if (!phone.value.trim()) { alert("전화번호를 입력해주세요."); phone.focus(); return; }
    if (!address.value.trim()) { alert("주소를 입력해주세요."); address.focus(); return; }
    if (!agree.checked) { alert("개인정보 동의가 필요합니다."); return; }

    let finalRef = refInput.value.trim() || window.currentReferrer || "직접 가입";

    const newUser = {
        bankName: name.value,
        bankPhone: phone.value,
        bankAddress: address.value,
        referrer: finalRef,
        date: new Date().toLocaleString()
    };
    
    saveAndRefresh('fin_wallets', newUser);

    alert(`🏦 [${name.value}] 님 설립 완료!`);

    name.value = ""; phone.value = ""; address.value = ""; agree.checked = false;
    showSection('dashboard', document.getElementById('btn-dashboard'));
}

// [1] 실시간 결제 시스템 완료 버튼 함수
function submitPayment() {
    const payInput = document.getElementById('payAmount');
    const amount = parseInt(payInput.value || 0);

    if (amount <= 0) { 
        alert("금액을 입력해주세요."); 
        payInput.focus();
        return; 
    }

    // 1. 현재 자산에 결제 금액 반영 (행사자 70%, 소비자 30% 배당 시뮬레이션)
    window.advertiser += Math.floor(amount * 0.7);
    window.consumer += Math.floor(amount * 0.3);

    // 2. [핵심] 늘어난 금액을 스마트폰 창고에 즉시 저장 (새로고침해도 유지용)
    localStorage.setItem('fin_advertiser', window.advertiser);
    localStorage.setItem('fin_consumer', window.consumer);

    // 3. 화면 숫자 즉시 업데이트
    updateAssetDisplay();

    alert(amount.toLocaleString() + "원 결제가 완료되어 실시간 배당되었습니다!");
    closePayment();
}

// [2] 자산 화면 업데이트 전용 함수
function updateAssetDisplay() {
    if (document.getElementById('advValue')) 
        document.getElementById('advValue').innerText = Math.floor(window.advertiser).toLocaleString() + "원";
    if (document.getElementById('consValue')) 
        document.getElementById('consValue').innerText = Math.floor(window.consumer).toLocaleString() + "원";
    if (document.getElementById('totalValue')) 
        document.getElementById('totalValue').innerText = Math.floor(window.advertiser + window.consumer).toLocaleString() + "원";
}

// [3] 초기 자산 설정 및 로드 (5만/2만 설정)
// 기존의 자산 변수 선언 부분을 아래와 같이 수정하세요.
window.advertiser = parseFloat(localStorage.getItem('fin_advertiser')) || 50000;
window.consumer = parseFloat(localStorage.getItem('fin_consumer')) || 20000;

// [4] 경제 지표 업데이트 루틴 수정 (누적 저장 포함)
function updateStatus() {
    // ... 기존 지급준비율/공유비율 로직 유지 ...

    // 자산 실시간 미세 증가 (28년 연구 알고리즘 시뮬레이션)
    window.advertiser += 2.4; 
    window.consumer += 1.0;

    // 1초마다 창고에 자동 저장 (안정성 확보)
    localStorage.setItem('fin_advertiser', window.advertiser);
    localStorage.setItem('fin_consumer', window.consumer);

    updateAssetDisplay();
}

// [7] 나의 현황 강제 갱신 (데이터 무제한 출력)
function forceUpdateAll() {
    const wallets = JSON.parse(localStorage.getItem('fin_wallets') || '[]');
    const ads = JSON.parse(localStorage.getItem('fin_ads') || '[]');
    const loans = JSON.parse(localStorage.getItem('fin_loans') || '[]');
    const routines = JSON.parse(localStorage.getItem('fin_routines') || '[]');

    document.getElementById('walletDisplay').innerHTML = wallets.map(w => 
        `<div style="border-bottom:1px solid #333; padding:5px;">✅ ${w.bankName}<br><small>${w.date}</small></div>`).join('') || "내역 없음";

    document.getElementById('adListDisplay').innerHTML = ads.map(a => 
        `<li style="border-bottom:1px solid #222; padding:3px 0;">📢 ${a.title}</li>`).join('') || "내역 없음";

    document.getElementById('loanListDisplay').innerHTML = loans.map(l => 
        `<li style="border-bottom:1px solid #222; padding:3px 0;">💰 ${l.title}</li>`).join('') || "내역 없음";

    document.getElementById('routineListDisplay').innerHTML = routines.map(r => 
        `<li style="border-bottom:1px solid #222; padding:3px 0;">🌀 ${r.title}</li>`).join('') || "내역 없음";
}

// --- 아래는 대표님이 주신 경제 엔진 및 AI 신호 로직 유지 ---

window.addEventListener('load', function() {
    // 초기화
    const urlParams = new URLSearchParams(window.location.search);
    const referrerName = urlParams.get('ref');
    const refInput = document.getElementById('bankReferrer');
    if (refInput) {
        refInput.value = referrerName || "CEO 채정석";
    }
    updateAISignal();
    setTimeout(startGrowth, 5000);
    forceUpdateAll();
});

function updateAISignal() {
    const assets = ["KOSPI200 선물", "삼성전자", "나스닥100", "금 선물", "이더리움"];
    const actions = ["매수 포착", "비중 확대", "관망(대기)", "강력 매수"];
    const colors = ["#ff416c", "#ff4b2b", "#888", "#00ffcc"];
    const assetEl = document.getElementById('assetName');
    const actionEl = document.getElementById('actionType');
    if (!assetEl || !actionEl) return;
    const rIdx = Math.floor(Math.random() * assets.length);
    const rActIdx = Math.floor(Math.random() * actions.length);
    assetEl.innerText = assets[rIdx];
    actionEl.innerText = actions[rActIdx];
    actionEl.style.background = colors[rActIdx];
    setTimeout(updateAISignal, 3000);
}

let liveCount = parseInt(localStorage.getItem('fin_live_users_v3')) || 13672;
function startGrowth() {
    liveCount += (Math.floor(Math.random() * 2) + 1);
    localStorage.setItem('fin_live_users_v3', liveCount);
    const countEl = document.getElementById('realtimeUserCount');
    if (countEl) countEl.innerText = liveCount.toLocaleString();
    setTimeout(startGrowth, 5000);
}

function toggleQR() { 
    const qr = document.getElementById('qrContainer');
    qr.style.display = (qr.style.display === 'none') ? 'block' : 'none';
}
function openPayment() { document.getElementById('paymentFields').style.display = 'block'; }
function closePayment() { document.getElementById('paymentFields').style.display = 'none'; }
