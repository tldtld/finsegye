    <script>
/* =========================================================
   1. 전역 변수 & 자산 엔진 (심장)
   ========================================================= */
window.loanPercent = 100.0;
window.aiRate = 0.0;
window.advertiser = window.advertiser || 50000;
window.consumer = window.consumer || 20000;
window.pause = false;
let liveCount = parseInt(localStorage.getItem('fin_live_users_v3')) || 10000;

function updateStatus() {
    try {
        // [지급준비율]
        const resElem = document.getElementById("reserveValue");
        if(resElem) resElem.innerText = (98.8 + Math.random() * 1.2).toFixed(2) + "%";

        // [공유비율 로직]
        if(!window.pause) {
            window.loanPercent -= 0.5;
            if(window.loanPercent <= 0) {
                window.loanPercent = 0; window.pause = true;
                setTimeout(() => { window.loanPercent = 100.0; window.pause = false; }, 5000);
            }
        }
        if(document.getElementById("loanPercent")) document.getElementById("loanPercent").innerText = window.loanPercent.toFixed(1) + "%";

        // [AI 수익률]
        window.aiRate += 0.01;
        if(document.getElementById("aiRate")) document.getElementById("aiRate").innerText = "+" + window.aiRate.toFixed(1) + "%";

        // [수익 합산] 0% 도달 시
        if (window.loanPercent === 0) { window.advertiser += 24; window.consumer += 20; }

        // [화면 출력]
        if(document.getElementById("advValue")) document.getElementById("advValue").innerText = Math.floor(window.advertiser).toLocaleString() + "원";
        if(document.getElementById("consValue")) document.getElementById("consValue").innerText = Math.floor(window.consumer).toLocaleString() + "원";
        if(document.getElementById("totalValue")) document.getElementById("totalValue").innerText = Math.floor(window.advertiser + window.consumer).toLocaleString() + "원";
    } catch(e) {}
}
setInterval(updateStatus, 100);

/* =========================================================
   2. 데이터 엔진 (나의 현황 - 무제한 스크롤)
   ========================================================= */
const FinData = {
    get: (key) => JSON.parse(localStorage.getItem('fin_' + key)) || [],
    add: (key, item) => {
        let list = FinData.get(key);
        item.date = new Date().toLocaleString();
        list.unshift(item); 
        localStorage.setItem('fin_' + key, JSON.stringify(list));
        FinData.updateUI(); 
    },
    updateUI: () => {
        const draw = (key, id, label) => {
            const el = document.getElementById(id);
            if(!el) return;
            const list = FinData.get(key);
            el.innerHTML = list.length === 0 ? '<div style="color:#555; padding:10px;">내역 없음</div>' : 
                list.map(i => `<div style="border-bottom:1px solid #333; padding:8px 0; font-size:0.85em;"><b>${label}</b> ${i.bankName || i.shopName || i.loanName || '내역'} <br><small style="color:#666;">${i.date}</small></div>`).join('');
        };
        draw('wallets', 'walletDisplay', '✅');
        draw('ads', 'adListDisplay', '📢');
        draw('loans', 'loanListDisplay', '💰');
        draw('routines', 'routineListDisplay', '🌀');
    }
};

/* =========================================================
   3. UI 및 신청 로직 (모든 버튼 활성화)
   ========================================================= */
function showSection(id, btn) {
    document.querySelectorAll('section').forEach(s => s.style.display = 'none');
    document.querySelectorAll('.nav button').forEach(b => b.classList.remove('active'));
    if(document.getElementById(id)) document.getElementById(id).style.display = 'block';
    if(btn) btn.classList.add('active');
    window.scrollTo(0, 0);
    if(id === 'mypage') FinData.updateUI();
}

// 🤝 QR 참여 버튼 (고정 해결)
function toggleQR() {
    const qr = document.getElementById('qrContainer');
    if(qr) qr.style.display = (qr.style.display === 'none' || qr.style.display === '') ? 'block' : 'none';
    const list = document.getElementById('liveListContainer');
    if(list) list.style.display = 'none';
}

/* =========================================================
   💳 실시간 결제 시스템 (토글 및 초기화 강화 버전)
   ========================================================= */

// 1. 버튼 클릭 시 열려있으면 닫고, 닫혀있으면 여는 '토글' 기능
function openPayment() {
    const fields = document.getElementById('paymentFields');
    const payInput = document.getElementById('payAmount');

    if (fields.style.display === 'block') {
        // 이미 열려있다면? -> 닫으면서 초기화
        closePayment();
    } else {
        // 닫혀있다면? -> 열기
        fields.style.display = 'block';
        if(payInput) payInput.focus();
    }
}

// 2. 취소 버튼을 누르거나 창이 닫힐 때 '금액'을 무조건 초기화
function closePayment() {
    const fields = document.getElementById('paymentFields');
    const payInput = document.getElementById('payAmount');

    if (fields) fields.style.display = 'none';
    if (payInput) payInput.value = ""; // ★ 대표님 요청: 입력값 초기화
}

// 3. 결제 완료 후 초기화 및 자산 반영
function submitPayment() {
    const payInput = document.getElementById('payAmount');
    const amount = parseInt(payInput.value || 0);

    if (amount <= 0) {
        alert("금액을 입력해주세요.");
        return;
    }

    // [자산 엔진에 반영]
    window.advertiser += Math.floor(amount * 0.7);
    window.consumer += Math.floor(amount * 0.3);
    
    alert(amount.toLocaleString() + "원 결제가 완료되어 자산에 반영되었습니다!");

    // ★ 결제 완료 후 즉시 입력칸 비우고 창 닫기
    closePayment(); 
}

/* =========================================================
   ♻️ 리셋 시스템 (엔진 멈춤 해결용)
   ========================================================= */
window.resetEconomy = function() {
    // 1. 모든 변수 강제 초기화
    window.advertiser = 50000;
    window.consumer = 20000;
    window.loanPercent = 100.0;
    window.aiRate = 0.0;

    // 2. 화면 출력 즉시 갱신
    if (document.getElementById('advValue')) document.getElementById('advValue').innerText = "50,000원";
    if (document.getElementById('consValue')) document.getElementById('consValue').innerText = "20,000원";
    if (document.getElementById('totalValue')) document.getElementById('totalValue').innerText = "70,000원";
    if (document.getElementById('loanPercent')) document.getElementById('loanPercent').innerText = "100.0%";

    alert("🚨 모든 경제 데이터가 초기화되었습니다.");
    
    // 3. 결제창이 열려있다면 닫기
    closePayment();
};

// [강화된 신청 로직] 빈칸 검사 추가
function submitAd() {
    const shop = document.getElementById("shopName").value;
    const area = document.getElementById("area").value;
    if(!shop || !area) return alert("상호명과 지역을 모두 입력해주세요.");
    FinData.add('ads', { shopName: shop, area: area });
    alert("📢 행사 신청이 완료되었습니다.");
    showSection('dashboard', document.getElementById('btn-dashboard'));
}

function submitLoan() {
    const name = document.getElementById("loanName").value;
    const amt = document.getElementById("loanAmount").value;
    if(!name || !amt) return alert("이름과 금액을 모두 입력해주세요.");
    FinData.add('loans', { loanName: name, loanAmount: amt });
    alert("💰 공유 신청이 완료되었습니다.");
    showSection('dashboard', document.getElementById('btn-dashboard'));
}

function submitRoutine() {
    const owner = document.getElementById("routineOwner").value;
    const region = document.getElementById("routineRegion").value;
    if(!owner || !region) return alert("제작자와 지역을 모두 입력해주세요.");
    FinData.add('routines', { routineOwner: owner, routineRegion: region });
    alert("🌀 루틴 생성이 완료되었습니다.");
    showSection('dashboard', document.getElementById('btn-dashboard'));
}

/* =========================================================
   🏦 지갑 설립 및 자동 입력 (완료 후 리셋 강화)
   ========================================================= */

// 1. 자동 입력 함수: 기존 값이 있더라도 새 값으로 덮어씁니다.
function autoFillInfo() {
    const name = document.getElementById('bankName');
    const phone = document.getElementById('bankPhone');
    const addr = document.getElementById('bankAddress');
    const agree = document.getElementById('bankAgree');

    if(name) name.value = "채정석";
    if(phone) phone.value = "010-2828-7788";
    if(addr) addr.value = "전북특별자치도 전주시";
    if(agree) agree.checked = true;
}

// 2. 카카오 인증 알림 후 자동 입력 실행
function autoFillKakao() { 
    alert("💬 카카오 인증이 완료되었습니다. 정보가 자동 입력됩니다."); 
    autoFillInfo(); 
}

// 3. 설립 완료 버튼: 저장 후 모든 입력창을 즉시 비웁니다.
function submitBank() {
    const nameInput = document.getElementById('bankName');
    const phoneInput = document.getElementById('bankPhone');
    const addressInput = document.getElementById('bankAddress');
    const agreeInput = document.getElementById('bankAgree');

    // [유효성 검사]
    if (!nameInput || !nameInput.value.trim()) {
        alert("성함을 입력해주세요.");
        return;
    }
    if (!agreeInput || !agreeInput.checked) {
        alert("개인정보 동의가 필요합니다.");
        return;
    }

    // [데이터 저장]
    FinData.add('wallets', { 
        bankName: nameInput.value,
        bankPhone: phoneInput.value,
        bankAddress: addressInput.value
    });

    alert(`🏦 [${nameInput.value}]님 지갑 설립 완료!`);

    // ★ [핵심] 다음 접속자를 위해 입력 필드 즉시 초기화 (청소)
    nameInput.value = "";
    if(phoneInput) phoneInput.value = "";
    if(addressInput) addressInput.value = "";
    if(agreeInput) agreeInput.checked = false;

    // 메인 화면으로 이동
    showSection('dashboard', document.getElementById('btn-dashboard'));
}
/* =========================================================
   4. 연출 및 실시간 엔진 (인원수 고정 해결)
   ========================================================= */
function startGrowth() {
    const countEl = document.getElementById('realtimeUserCount');
    if (countEl) {
        liveCount += Math.floor(Math.random() * 2) + 1;
        localStorage.setItem('fin_live_users_v3', liveCount);
        countEl.innerText = liveCount.toLocaleString();
    }
    setTimeout(startGrowth, Math.random() * 4000 + 4000);
}

function updateAISignal() {
    const assets = ["KOSPI200", "삼성전자", "핀세계 AI", "GOLD", "나스닥100"];
    const actions = ["매수 포착", "비중 확대", "관망(대기)"];
    if(document.getElementById('assetName')) 
        document.getElementById('assetName').innerText = assets[Math.floor(Math.random() * assets.length)];
    if(document.getElementById('actionType')) 
        document.getElementById('actionType').innerText = actions[Math.floor(Math.random() * actions.length)];
    setTimeout(updateAISignal, 3000);
}

window.addEventListener('load', () => {
    FinData.updateUI();
    updateAISignal();
    setTimeout(startGrowth, 5000); // 5초 뒤 인원 증가 시작
});
</script>
