               style="width: 80%; padding: 12px; margin-top: -10px; border-radius: 8px; border: none; outline: none; font-size: 1.1em; text-align: center; background: #fff; color: #000; font-weight: bold;">

        <div style="border-top: 1px solid #333; margin: 15px 0; position: relative;">

        <input id="bankPhone" type="tel" placeholder="전화번호" style="width: 90%; margin-bottom: 8px; background: #111; color: #fff; border: 1px solid #444; padding: 10px; border-radius: 5px;">

<div class="nav">
    <button onclick="showSection('dashboard', this)" id="btn-dashboard" class="active">자산<br>현황</button>
    <button onclick="showSection('adApplyForm', this)" id="btn-adApplyForm">행사<br>신청</button>
    <button onclick="showSection('loanApplyForm', this)" id="btn-loanApplyForm">공유<br>신청</button>
    <button onclick="showSection('routineForm', this)" id="btn-routineForm">행사<br>루틴</button>
    <button onclick="showSection('bankForm', this)" id="btn-bankForm">지갑<br>설립</button>

<script>
    var isMypageExpanded = false;

    // 공통 저장 함수
    function handleStorage(key, item, msg) {
        try {
            let list = JSON.parse(localStorage.getItem(key) || '[]');
            list.unshift(item);
            localStorage.setItem(key, JSON.stringify(list));
            alert(msg);
            showSection('mypage', document.getElementById('btn-mypage'));
        } catch(e) { alert("저장 오류: " + e.message); }
    }

    // 1. [행사 신청] 유효성 검사
    function submitAd() {
        const shop = document.getElementById('shopName');
        const type = document.getElementById('bizType');
        const area = document.getElementById('area');
        const text = document.getElementById('adText');

        if (!shop.value.trim()) { alert("상호명을 입력해주세요."); shop.focus(); return; }
        if (!type.value.trim()) { alert("업종/업태를 입력해주세요."); type.focus(); return; }
        if (!area.value.trim()) { alert("행사 지역이 어디인가요?"); area.focus(); return; }
        if (!text.value.trim()) { alert("행사 문구를 입력해주세요."); text.focus(); return; }

        const item = { shopName: shop.value, bizType: type.value, area: area.value, adText: text.value, date: new Date().toLocaleString() };
        handleStorage('fin_ads', item, "📢 [" + shop.value + "] 행사 신청이 완벽하게 입고되었습니다!");

        // 입력창 비우기
        [shop, type, area, text].forEach(el => el.value = "");
    }

    // 2. [공유 신청] 유효성 검사
    function submitLoan() {
        const name = document.getElementById('loanName');
        const amount = document.getElementById('loanAmount');
        const purpose = document.getElementById('loanPurpose');

        if (!name.value.trim()) { alert("신청자 성함을 입력해주세요."); name.focus(); return; }
        if (!amount.value.trim()) { alert("신청 금액을 입력해주세요."); amount.focus(); return; }
        if (!purpose.value.trim()) { alert("공유 목적을 입력해주세요."); purpose.focus(); return; }

        const item = { loanName: name.value, loanAmount: amount.value, loanPurpose: purpose.value, date: new Date().toLocaleString() };
        handleStorage('fin_loans', item, "💰 [" + name.value + "] 님 공유 신청이 완료되었습니다!");

        [name, amount, purpose].forEach(el => el.value = "");
    }

    // 3. [행사 루틴] 유효성 검사
    function submitRoutine() {
        const owner = document.getElementById('routineOwner');
        const region = document.getElementById('routineRegion');
        const text = document.getElementById('routineText');

        if (!owner.value.trim()) { alert("제작자 이름을 입력해주세요."); owner.focus(); return; }
        if (!region.value.trim()) { alert("적용 지역을 입력해주세요."); region.focus(); return; }
        if (!text.value.trim()) { alert("루틴 내용을 입력해주세요."); text.focus(); return; }

        const item = { routineOwner: owner.value, routineRegion: region.value, routineText: text.value, date: new Date().toLocaleString() };
        handleStorage('fin_routines', item, "🌀 [" + owner.value + "] 루틴 생성이 완료되었습니다!");

        [owner, region, text].forEach(el => el.value = "");
    }







function submitBank() {
    const name = document.getElementById('bankName');
    const phone = document.getElementById('bankPhone');
    const address = document.getElementById('bankAddress'); // 주소창 추가
    const agree = document.getElementById('bankAgree');
    const refInput = document.getElementById('bankReferrer');

    // 유효성 검사
    if (!name.value.trim()) { alert("성함을 입력해주세요."); name.focus(); return; }
    if (!agree.checked) { alert("개인정보 동의가 필요합니다."); return; }

    // 추천인 결정
    let finalRef = refInput.value.trim() || window.currentReferrer || "직접 가입";

    const newUser = {
        bankName: name.value,
        bankPhone: phone.value,
        bankAddress: address.value, // 주소 데이터 포함
        referrer: finalRef,
        date: new Date().toLocaleString()
    };

    let wallets = JSON.parse(localStorage.getItem('fin_wallets') || '[]');
    wallets.unshift(newUser);
    localStorage.setItem('fin_wallets', JSON.stringify(wallets));

    alert(`🏦 [${name.value}] 님 설립 완료!\n추천인: ${finalRef}`);

    // [핵심] 폼 비우기 (주소창까지 확실하게!)
    name.value = "";
    phone.value = "";
    address.value = ""; // ★ 대표님, 이제 주소 잔상이 남지 않습니다!
    agree.checked = false;

    // [핵심] 커서 위치 조정
    // 추천인 칸이 아니라, 다음 입력을 위해 '성명' 칸으로 커서를 보냅니다.
    setTimeout(() => { name.focus(); }, 150);

    if (typeof updateRealtimeList === "function") updateRealtimeList();
}


// [교체대상 1] 화면 전환 및 '나의 현황' 접고 펴기 기능
function showSection(sectionId, btn) {
    document.querySelectorAll('section').forEach(s => s.style.display = 'none');
    document.querySelectorAll('.nav button').forEach(b => b.classList.remove('active'));

    const target = document.getElementById(sectionId);
    if(target) target.style.display = 'block';
    if(btn) btn.classList.add('active');

    // 🚀 나의 현황 토글(접고 펴기) 핵심 로직
    if(sectionId === 'mypage') {
        // 현재 상태를 반전시킵니다 (접힘 <-> 펼침)
        isMypageExpanded = !isMypageExpanded;
        // 갱신 함수를 즉시 실행해서 화면을 접거나 펼칩니다.
        if(typeof forceUpdateAll === "function") forceUpdateAll();
    } else {
        // 다른 탭을 누르면 '나의 현황'은 접힌 상태로 리셋합니다.
        isMypageExpanded = false;
    }

    // 다른 입력 폼들은 첫 칸에 커서를 주되, 지갑설립(bankForm)은 대표님 요청대로 제외했습니다.
    if (sectionId === 'adApplyForm') document.getElementById('shopName').focus();
    if (sectionId === 'loanApplyForm') document.getElementById('loanName').focus();
    if (sectionId === 'routineForm') document.getElementById('routineOwner').focus();
}




    /* 2. 🚀 바로 여기! showSection 함수가 끝나는 중괄호(}) 바로 아래에 붙여넣으세요 */
    function showBankForm() {
        // 1. 가입 섹션을 보여줍니다
        showSection('bankForm');

        // 2. 0.1초 뒤에 추천인 칸에 커서를 깜빡이게(포커스) 합니다.
        setTimeout(() => {
            const refInput = document.getElementById('bankReferrer');
            if (refInput) {
                refInput.focus();
            }
        }, 100);
    }





   function forceUpdateAll() {
    // 1. 현재 화면의 공유비율 값을 숫자로 가져옵니다.
    const loanPercentEl = document.getElementById('loanPercent');
    if (!loanPercentEl) return;

    const currentLoanPercent = parseFloat(loanPercentEl.innerText);

    // [핵심 로직] 공유비율이 0%가 아닐 때(즉, 0보다 클 때)는 업데이트를 멈춥니다.
    if (currentLoanPercent > 0) {
        // 이 블록이 실행되면 아래의 자산 갱신 코드를 모두 건너뜁니다.
        // 즉, 행사자, 소비자, 합계 숫자가 변하지 않고 고정됩니다.
        console.log("공유비율이 0%가 아니므로 자산 지표가 고정(잠금)되었습니다.");
        return;
    }

    // --- 여기서부터는 공유비율이 0%일 때만 실행되는 코드입니다 ---

    const config = [
        { id: 'walletDisplay', key: 'fin_wallets', nameKey: 'bankName' },
        { id: 'adListDisplay', key: 'fin_ads', nameKey: 'shopName' },
        { id: 'loanListDisplay', key: 'fin_loans', nameKey: 'loanName' },
        { id: 'routineListDisplay', key: 'fin_routines', nameKey: 'routineOwner' }
    ];

    config.forEach(cat => {
        const el = document.getElementById(cat.id);
        if(!el) return;
        let data = JSON.parse(localStorage.getItem(cat.key) || '[]');
        if(data.length > 0) {
            if(isMypageExpanded) {
                el.innerHTML = data.map(item =>
                    `<div style="border-bottom:1px solid #333; padding:5px 0; font-size:0.8em; color:#fff;">
                        ✅ ${item.date}<br>${item[cat.nameKey]}
                    </div>`
                ).join('');
            } else {
                const top = data[0];
                let shortTime = top.date.split(' ').slice(-2).join(' ');
                el.innerHTML = `<div style="color:gold; font-size:0.8em;">🕒 ${shortTime}<br>${top[cat.nameKey]} 완료</div>`;
            }
        } else {
            el.innerHTML = "<span style='color:#666;'>내역 없음</span>";
        }
    });

    const total = JSON.parse(localStorage.getItem('fin_wallets') || '[]').length;
    if(document.getElementById('realtimeUserCount')) document.getElementById('realtimeUserCount').innerText = total;
}
    setInterval(forceUpdateAll, 1000);
    window.onload = forceUpdateAll;

    // [기능 1] QR 코드 토글
function toggleQR() {
    const qr = document.getElementById('qrContainer');
    qr.style.display = (qr.style.display === 'none' || qr.style.display === '') ? 'block' : 'none';
    // 명단이 열려있다면 닫기 (선택 사항)
    document.getElementById('liveListContainer').style.display = 'none';
}

// [기능 2] 실시간 명단 토글
function toggleLiveList() {
    const list = document.getElementById('liveListContainer');
    list.style.display = (list.style.display === 'none' || list.style.display === '') ? 'block' : 'none';
    // QR이 열려있다면 닫기 (선택 사항)
    document.getElementById('qrContainer').style.display = 'none';
}

// [기능 3] 실시간 명단 업데이트 (기존 forceUpdateAll 안에 포함하거나 별도 유지)
function updateRealtimeList() {
    const data = JSON.parse(localStorage.getItem('fin_wallets') || '[]');

    // 인원수 업데이트
    const countEl = document.getElementById('realtimeUserCount');
    if(countEl) countEl.innerText = data.length;

    // 명단 리스트 업데이트
    const listEl = document.getElementById('realtimeNameList');
    if(listEl) {
        if(data.length > 0) {
            listEl.innerHTML = data.slice(0, 15).map(u =>
                `<div style="border-bottom:1px solid #333; padding:3px 0;">✅ ${u.bankName}님 설립완료</div>`
            ).join('');
        } else {
            listEl.innerHTML = "참여 내역이 없습니다.";
        }
    }
}
let isSystemPaused = false; // 시스템 정지 상태 변수



/* =========================================================
   1. 탭 제어 로직 (공유참여, 실시간참여, 결제시스템)
   ========================================================= */

// [탭 1] 공유경제참여 (QR 코드) 토글
function toggleQR() {
    const qr = document.getElementById('qrContainer');
    const liveList = document.getElementById('liveListContainer');
    const payment = document.getElementById('paymentFields');

    if (!qr) return;

    // QR 열기/닫기
    qr.style.display = (qr.style.display === 'none' || qr.style.display === '') ? 'block' : 'none';

    // 다른 탭은 닫기
    if (liveList) liveList.style.display = 'none';
    if (payment) closePayment();
}

// [탭 2] 실시간참여 (명단) 토글
function toggleLiveList() {
    const qr = document.getElementById('qrContainer');
    const liveList = document.getElementById('liveListContainer');
    const payment = document.getElementById('paymentFields');

    if (!liveList) return;

    // 명단 열기/닫기
    liveList.style.display = (liveList.style.display === 'none' || liveList.style.display === '') ? 'block' : 'none';

    // 다른 탭은 닫기
    if (qr) qr.style.display = 'none';
    if (payment) closePayment();

    // 명단 즉시 갱신
    if (typeof updateRealtimeList === "function") updateRealtimeList();
}

// [탭 3] 실시간 결제 시스템 열기
function openPayment() {
    const fields = document.getElementById('paymentFields');
    const payBox = document.getElementById('paymentBox');
    const qr = document.getElementById('qrContainer');
    const liveList = document.getElementById('liveListContainer');

    if (!fields) return;

    // 시스템 일시 정지 (economy.js와 연동)
    window.isSystemPaused = true;

    // 결제창 보이기
    fields.style.display = 'block';
    if (payBox) payBox.style.borderColor = '#ff416c';

    // 다른 탭 닫기
    if (qr) qr.style.display = 'none';
    if (liveList) liveList.style.display = 'none';

    // 입력창 포커스
    setTimeout(() => {
        const input = document.getElementById('payAmount');
        if (input) input.focus();
    }, 150);
}

// 결제창 닫기 (취소 또는 완료 시)
function closePayment() {
    const fields = document.getElementById('paymentFields');
    const payBox = document.getElementById('paymentBox');
    const payInput = document.getElementById('payAmount');

    window.isSystemPaused = false; // 시스템 재가동

    if (fields) fields.style.display = 'none';
    if (payBox) payBox.style.borderColor = '#00ffcc';
    if (payInput) payInput.value = "";
}

/* =========================================================
   2. 실시간 결제 금액 반영 알고리즘 (완성체)
   ========================================================= */

function submitPayment() {
    const payInput = document.getElementById('payAmount');
    const amount = parseInt(payInput ? payInput.value : 0);

    if (!amount || amount <= 0) {
        alert("금액을 입력해주세요.");
        if (payInput) payInput.focus();
        return;
    }

    // [데이터 주입] 원본 변수 수정 (economy.js의 window.advertiser 수정)
    const advShare = Math.floor(amount * 0.7);
    const consShare = amount - advShare;

    window.advertiser += advShare;
    window.consumer += consShare;

    // [즉시 반영] 화면 갱신 함수 호출 (economy.js에 정의된 함수)
    if (typeof renderAssetUI === "function") {
        renderAssetUI();
    } else {
        // 백업용 수동 갱신
        document.getElementById("advValue").innerText = Math.floor(window.advertiser).toLocaleString() + "원";
        document.getElementById("consValue").innerText = Math.floor(window.consumer).toLocaleString() + "원";
        document.getElementById("totalValue").innerText = Math.floor(window.advertiser + window.consumer).toLocaleString() + "원";
    }

    alert(amount.toLocaleString() + "원 결제가 완료되었습니다.\n합산된 금액에서 실시간 상승이 시작됩니다.");

    closePayment();
}

/* =========================================================
   3. 보조 기능 (명단 업데이트 등)
   ========================================================= */
function updateRealtimeList() {
    const data = JSON.parse(localStorage.getItem('fin_wallets') || '[]');
    const listEl = document.getElementById('realtimeNameList');
    if (listEl) {
        if (data.length > 0) {
            listEl.innerHTML = data.slice(0, 10).map(u => `✅ ${u.bankName} 님 설립완료`).join('<br>');
        } else {
            listEl.innerHTML = "참여 내역이 없습니다.";
        }
    }
}

// 1초마다 명단 갱신
setInterval(updateRealtimeList, 1000);



/* =========================================================
   [시연 전용] 자동 입력 시뮬레이션 함수

    const randomName = names[Math.floor(Math.random() * names.length)];
    const randomAddr = addresses[Math.floor(Math.random() * addresses.length)];

/* [추가] 주소창에서 추천인 정보를 읽어오는 함수 */
function getReferrerFromURL() {
    const urlParams = new URLSearchParams(window.location.search);
    return urlParams.get('ref') || "직접가입"; // ref 파라미터가 없으면 '직접가입'
}

// [최종 수정본] 주소 잔상 제거 및 커서 제어 기능 포함
function submitBank() {
    const name = document.getElementById('bankName');
    const phone = document.getElementById('bankPhone');
    const address = document.getElementById('bankAddress'); 
    const agree = document.getElementById('bankAgree');
    const refInput = document.getElementById('bankReferrer');

    if (!name.value.trim()) { alert("성함을 입력해주세요."); name.focus(); return; }
    if (!agree.checked) { alert("개인정보 동의가 필요합니다."); return; }

    let finalRef = refInput.value.trim() || window.currentReferrer || "직접 가입";

    const newUser = {
        bankName: name.value,
        bankPhone: phone.value,
        bankAddress: address.value, 
        referrer: finalRef,
        date: new Date().toLocaleString()
    };
    let wallets = JSON.parse(localStorage.getItem('fin_wallets') || '[]');
    wallets.unshift(newUser);
    localStorage.setItem('fin_wallets', JSON.stringify(wallets));

    alert(`🏦 [${name.value}] 님 설립 완료!\n추천인: ${finalRef}`);

    // 주소까지 깨끗하게 비우기
    name.value = "";
    phone.value = "";
    address.value = ""; 
    agree.checked = false;

    // 완료 후 성명 칸으로 커서 이동
    setTimeout(() => { if (name) name.focus(); }, 150);
    if (typeof updateRealtimeList === "function") updateRealtimeList();
}

/* 페이지 로드 시 초기화 및 QR 진입 제어 */
window.addEventListener('load', function() {
    const urlParams = new URLSearchParams(window.location.search);
    const referrerName = urlParams.get('ref');
    const refInput = document.getElementById('bankReferrer');
    const nameInput = document.getElementById('bankName');

    if (referrerName) {
        window.currentReferrer = referrerName;
        if (refInput) {
            refInput.value = referrerName;
            refInput.readOnly = true; 
            refInput.style.backgroundColor = "#222"; 
        }
        // QR 진입 시 바로 성명 칸으로 커서 이동
        if (nameInput) setTimeout(() => { nameInput.focus(); }, 500);
    } else {
        window.currentReferrer = "직접 가입";
        if (refInput) refInput.value = "";
    }

    if (!referrerName && document.activeElement) document.activeElement.blur();
});
