<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>FINSEGYE</title>
    <link rel="stylesheet" href="style.css">
    <style>
        /* [추가] 재미나이 가동 시 붕붕 움직이는 파동 효과 */
        @keyframes micFloating {
            0% { transform: scale(1); opacity: 0.8; }
            50% { transform: scale(2.2); opacity: 0; }
            100% { transform: scale(1); opacity: 0; }
        }
        .mic-active { display: block !important; animation: micFloating 1.2s infinite ease-out; }
        
        /* [추가] 하단 탭 활성화 색상 */
        .nav button.active { color: #fff !important; background: rgba(255,215,0,0.1) !important; }
    </style>
</head>
<body style="background-color: black; margin: 0; padding: 0;">

<canvas id="stars"></canvas>

<div id="statusContainer">
    <div id="reserveBox">지급준비율<br><span id="reserveValue">100.0%</span></div>
    <div id="loanBox">공유비율<br><span id="loanPercent">100.0%</span></div>
    <div id="aiBox">AI 수익률<br><span id="aiRate">+0.0%</span></div>
</div>

<div class="top-spacer" style="height: 60px;"></div>

<section id="dashboard" style="display:block; padding-top: 3px;">
    <div class="asset-wrapper" style="margin-top:10px;">
        <div class="digital">행사자<br><span id="advValue">50,000원</span></div>
        <div class="digital">소비자<br><span id="consValue">20,000원</span></div>
    </div>
    <div style="font-size:1.4em; margin:0px 0; color:gold; font-weight:bold; border-bottom:1px solid #333; padding-bottom:10px; text-align:center;">
        <span>합계: <span id="totalValue">70,000원</span></span>
        <button onclick="if(confirm('수치를 초기화할까요?')) resetEconomy();" style="vertical-align: middle; background: rgba(255,255,255,0.05); border: 1px solid #555; color: #777; font-size: 10px; padding: 1px 4px; border-radius: 3px;">RESET</button>
    </div>

    <div id="aiSignalBox" style="margin: 10px auto; border: 1.5px solid #ff00ff; border-radius: 8px; background: rgba(255,0,255,0.1); width: 90%; height: 60px; display: flex; flex-direction: column; justify-content: center; align-items: center;">
        <div style="font-size: 11px; color: #ff00ff; font-weight: bold; margin-bottom: 4px;">📡 AI 딥러닝 투자 포착</div>
        <div id="signalDisplay" style="display:flex; justify-content:center; align-items:center; gap:6px;">
            <div id="assetName" style="font-size: 13px; color: #fff; font-weight: bold;">시장 분석 중...</div>
            <div id="actionType" style="font-size: 10px; padding: 2px 8px; border-radius: 10px; font-weight: bold; background: #444;">대기</div>
        </div>
    </div>

    <div style="display: flex; gap: 8px; margin: 15px auto; width: 98%; align-items: flex-start;">
        <div style="flex: 1; display: flex; flex-direction: column; gap: 8px;">
            <button onclick="toggleQR()" style="width: 100%; height: 60px; background: linear-gradient(135deg, #a1c4fd, #c2e9fb); color: #222; border: none; border-radius: 12px; font-size: 0.9em; font-weight: bold;">🤝 QR참여</button>
            <div id="qrContainer" style="display: none; padding: 10px; background: white; border-radius: 12px; text-align: center;" onclick="showSection('bankForm', document.getElementById('btn-bankForm'))">
                <img src="https://api.qrserver.com/v1/create-qr-code/?size=100x100&data=https://finsegye.com" style="width:100px;">
                <div style="font-size:0.65em; color:#444; font-weight:bold; margin-top:5px;">스캔 시 지갑설립 이동</div>
            </div>
        </div>
        <div style="flex: 1; display: flex; flex-direction: column; gap: 8px;">
            <button onclick="toggleLiveList()" style="width: 100%; height: 60px; background: rgba(0, 255, 204, 0.1); border: 1.5px solid #00ffcc; color: #00ffcc; border-radius: 12px; font-size: 0.85em; font-weight: bold;">
                실시간 <span id="realtimeUserCount">10,000</span>명
            </button>
            <div id="liveListContainer" style="display: none; padding: 10px; background: rgba(255,255,255,0.05); border: 1px solid rgba(0,255,204,0.3); border-radius: 12px; height: 100px; overflow-y: auto; font-size: 0.75em; color: #eee;" id="realtimeNameList">데이터 로딩 중...</div>
        </div>
    </div>

    <div id="paymentBox" style="width: 98%; margin: 10px auto; background: rgba(255,255,255,0.1); border: 1.5px solid #00ffcc; border-radius: 12px; overflow: hidden;">
        <div onclick="openPayment()" style="height: 50px; display: flex; justify-content: center; align-items: center; cursor: pointer; color: #00ffcc; font-weight: bold;">💳 실시간결제시스템</div>
        <div id="paymentFields" style="display: none; padding: 15px; border-top: 1px solid rgba(0,255,204,0.3); text-align: center;">
            <input id="payAmount" type="number" placeholder="결제 금액 입력" style="width: 80%; padding: 12px; border-radius: 8px; font-weight: bold;">
            <div style="margin-top: 10px;"><button onclick="submitPayment()" style="padding: 10px 20px; background: #00ffcc; border: none; border-radius: 8px; font-weight: bold;">완료</button></div>
        </div>
    </div>

    <div onclick="presentGemini()" style="width: 90%; height: 45px; margin: 15px auto; background: rgba(0, 255, 204, 0.1); border: 1.5px solid rgba(0, 255, 204, 0.5); border-radius: 10px; display: flex; align-items: center; justify-content: center; color: #fff; font-weight: bold; position: relative; cursor: pointer;">
        🎤 재미나이 상담 엔진 가동
        <span id="micPulse" style="position: absolute; width: 20px; height: 20px; background: rgba(0, 255, 204, 0.4); border-radius: 50%; display: none;"></span>
    </div>
</section>

<section id="adApplyForm" style="display:none;"><div class="form-box"><input id="shopName" type="text" placeholder="상호명"><button class="submitBtn" onclick="submitAd()">📩 행사 신청하기</button></div></section>
<section id="loanApplyForm" style="display:none;"><div class="form-box"><input id="loanName" type="text" placeholder="신청자명"><button class="submitBtn" onclick="submitLoan()">💰 공유 신청하기</button></div></section>
<section id="routineForm" style="display:none;"><div class="form-box"><input id="routineOwner" type="text" placeholder="제작자 이름"><button class="submitBtn" onclick="submitRoutine()">🌀 루틴 생성하기</button></div></section>
<section id="bankForm" style="display:none;"><div class="form-box"><h3>🏦 AI 지갑 설립</h3><input id="bankName" type="text" placeholder="성명"><button class="submitBtn" onclick="submitBank()">🚀 지갑 설립 완료</button></div></section>
<section id="mypage" style="display:none; padding: 10px;"><div style="color: gold;">나의 현황 데이터 로딩 중...</div></section>

<div class="nav" style="position: fixed !important; bottom: 0 !important; left: 0 !important; width: 100% !important; height: 65px !important; background: #000 !important; display: flex !important; justify-content: space-around !important; align-items: center !important; z-index: 999999 !important; border-top: 1px solid #333 !important; padding-bottom: env(safe-area-inset-bottom) !important;">
    <button onclick="showSection('dashboard', this)" id="btn-dashboard" class="active" style="background:none; border:none; color:gold; font-size:11px; flex:1;">자산<br>현황</button>
    <button onclick="showSection('adApplyForm', this)" id="btn-adApplyForm" style="background:none; border:none; color:gold; font-size:11px; flex:1;">행사<br>신청</button>
    <button onclick="showSection('loanApplyForm', this)" id="btn-loanApplyForm" style="background:none; border:none; color:gold; font-size:11px; flex:1;">공유<br>신청</button>
    <button onclick="showSection('routineForm', this)" id="btn-routineForm" style="background:none; border:none; color:gold; font-size:11px; flex:1;">행사<br>루틴</button>
    <button onclick="showSection('bankForm', this)" id="btn-bankForm" style="background:none; border:none; color:gold; font-size:11px; flex:1;">지갑<br>설립</button>
    <button onclick="showSection('mypage', this)" id="btn-mypage" style="background:none; border:none; color:gold; font-size:11px; flex:1;">나의<br>현황</button>
</div>

<script src="ui_forms.js"></script>
<script src="economy.js"></script>
<script src="ui_logic.js"></script>
<script src="ui_dashboard.js"></script>

<script>
// [1] 화면 전환 함수 (섹션 연결 복구)
function showSection(sectionId, btn) {
    document.querySelectorAll('section').forEach(s => s.style.display = 'none');
    document.querySelectorAll('.nav button').forEach(b => b.classList.remove('active'));
    const target = document.getElementById(sectionId);
    if(target) target.style.display = 'block';
    if(btn) btn.classList.add('active');
    window.scrollTo(0, 0);
}

// [2] 재미나이 음성 비서 (가동 시 붕붕 효과 포함)
function presentGemini() {
    const SpeechRecognition = window.SpeechRecognition || window.webkitSpeechRecognition;
    const micPulse = document.getElementById('micPulse');
    if (!SpeechRecognition) { alert("크롬을 사용해 주세요."); return; }

    const recognition = new SpeechRecognition();
    recognition.lang = 'ko-KR';
    
    function speak(text) {
        window.speechSynthesis.cancel();
        const msg = new SpeechSynthesisUtterance(text);
        msg.lang = 'ko-KR';
        window.speechSynthesis.speak(msg);
    }

    recognition.onstart = function() {
        micPulse.classList.add('mic-active');
        speak("재미나이가 가동되었습니다. 말씀하세요.");
    };

    recognition.onresult = function(event) {
        const userText = event.results[0][0].transcript;
        micPulse.classList.remove('mic-active');
        let aiResponse = "네 대표님, 핀세계 플랫폼은 음성으로 모든 경제 활동이 가능합니다.";
        if(userText.includes("자산")) aiResponse = "자산 현황은 실시간 배당 합계를 보여주는 지표입니다.";
        alert("🗣️ 질문: " + userText + "\n🤖 답변: " + aiResponse);
        speak(aiResponse);
    };
    recognition.onerror = function() { micPulse.classList.remove('mic-active'); };
    recognition.onend = function() { micPulse.classList.remove('mic-active'); };
    recognition.start();
}

// [3] 기존 기능 제어 함수
function toggleQR() { const q = document.getElementById('qrContainer'); q.style.display = q.style.display==='none'?'block':'none'; }
function toggleLiveList() { const l = document.getElementById('liveListContainer'); l.style.display = l.style.display==='none'?'block':'none'; }
function openPayment() { document.getElementById('paymentFields').style.display = 'block'; }
function closePayment() { document.getElementById('paymentFields').style.display = 'none'; }
</script>
</body>
</html>
