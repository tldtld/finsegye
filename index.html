  <script>
/* =========================================================
   1. 핀세계 핵심 경제 엔진 (자산 수치)
   ========================================================= */
window.loanPercent = 100.0;
window.aiRate = 0.0;
window.advertiser = window.advertiser || 50000;
window.consumer = window.consumer || 20000;
window.pause = false;

function updateStatus() {
    try {
        if(document.getElementById("reserveValue")) 
            document.getElementById("reserveValue").innerText = (98.8 + Math.random() * 1.2).toFixed(2) + "%";

        if(!window.pause) {
            window.loanPercent -= 0.5;
            if(window.loanPercent <= 0) {
                window.loanPercent = 0; window.pause = true;
                setTimeout(() => { window.loanPercent = 100.0; window.pause = false; }, 5000);
            }
        }
        if(document.getElementById("loanPercent")) document.getElementById("loanPercent").innerText = window.loanPercent.toFixed(1) + "%";
        window.aiRate += 0.01;
        if(document.getElementById("aiRate")) document.getElementById("aiRate").innerText = "+" + window.aiRate.toFixed(1) + "%";
        if (window.loanPercent === 0) { window.advertiser += 24; window.consumer += 20; }
        if(document.getElementById("advValue")) document.getElementById("advValue").innerText = Math.floor(window.advertiser).toLocaleString() + "원";
        if(document.getElementById("consValue")) document.getElementById("consValue").innerText = Math.floor(window.consumer).toLocaleString() + "원";
        if(document.getElementById("totalValue")) document.getElementById("totalValue").innerText = Math.floor(window.advertiser + window.consumer).toLocaleString() + "원";
    } catch(e) {}
}
setInterval(updateStatus, 100);

/* =========================================================
   2. 데이터 엔진 (나의 현황 관리)
   ========================================================= */
const FinData = {
    get: (key) => JSON.parse(localStorage.getItem('fin_' + key)) || [],
    add: (key, item) => {
        let list = FinData.get(key);
        item.date = new Date().toLocaleString();
        list.unshift(item);
        localStorage.setItem('fin_' + key, JSON.stringify(list));
        FinData.updateUI();
    },
    updateUI: () => {
        const draw = (key, id, label) => {
            const el = document.getElementById(id);
            if(!el) return;
            const list = FinData.get(key);
            el.innerHTML = list.length === 0 ? '<div style="color:#555; padding:10px;">내역 없음</div>' : 
                list.map(i => `<div style="border-bottom:1px solid #333; padding:8px 0; font-size:0.85em;"><b>${label}</b> ${i.bankName || i.shopName || i.loanName || i.routineOwner}</div>`).join('');
        };
        draw('wallets', 'walletDisplay', '✅');
        draw('ads', 'adListDisplay', '📢');
        draw('loans', 'loanListDisplay', '💰');
        draw('routines', 'routineListDisplay', '🌀');
    }
};

/* =========================================================
   3. 정밀 검증 및 자동 청소 신청 로직 (원포인트 해결)
   ========================================================= */

// [만능 청소기] 모든 입력창 비우기
function clearAllInputs() {
    document.querySelectorAll('input, textarea').forEach(el => {
        if (el.type === 'checkbox') el.checked = false;
        else el.value = '';
    });
}

// 📢 행사 신청: 상호명, 업종, 지역, 문구 4종 필수 검사
function submitAd() {
    const shop = document.getElementById("shopName");
    const biz = document.getElementById("bizType");
    const area = document.getElementById("area");
    const text = document.getElementById("adText");

    if (!shop.value.trim()) { alert("⚠️ 상호명을 입력해 주세요."); shop.focus(); return; }
    if (!biz.value.trim()) { alert("⚠️ 업종을 입력해 주세요."); biz.focus(); return; }
    if (!area.value.trim()) { alert("⚠️ 행사 지역을 입력해 주세요."); area.focus(); return; }
    if (!text.value.trim()) { alert("⚠️ 행사 문구를 입력해 주세요."); text.focus(); return; }

    FinData.add('ads', { shopName: shop.value });
    alert("📢 행사 신청 완료!");
    clearAllInputs();
    showSection('dashboard', document.getElementById('btn-dashboard'));
}

// 💰 공유 신청: 신청자명, 금액 2종 필수 검사
function submitLoan() {
    const name = document.getElementById("loanName");
    const amount = document.getElementById("loanAmount");

    if (!name.value.trim()) { alert("⚠️ 신청자명을 입력해 주세요."); name.focus(); return; }
    if (!amount.value.trim()) { alert("⚠️ 공유 금액을 입력해 주세요."); amount.focus(); return; }

    FinData.add('loans', { loanName: name.value });
    alert("💰 공유 신청 완료!");
    clearAllInputs();
    showSection('dashboard', document.getElementById('btn-dashboard'));
}

// 🌀 행사 루틴: 제작자, 지역 2종 필수 검사
function submitRoutine() {
    const owner = document.getElementById("routineOwner");
    const region = document.getElementById("routineRegion");

    if (!owner.value.trim()) { alert("⚠️ 제작자를 입력해 주세요."); owner.focus(); return; }
    if (!region.value.trim()) { alert("⚠️ 해당 지역을 입력해 주세요."); region.focus(); return; }

    FinData.add('routines', { routineOwner: owner.value });
    alert("🌀 루틴 생성 완료!");
    clearAllInputs();
    showSection('dashboard', document.getElementById('btn-dashboard'));
}

// 🏦 지갑 설립: 성함, 휴대폰, 주소, 동의 필수 검사
function submitBank() {
    const name = document.getElementById('bankName');
    const phone = document.getElementById('bankPhone');
    const addr = document.getElementById('bankAddress');
    const agree = document.getElementById('bankAgree');

    if (!name.value.trim()) { alert("⚠️ 성함을 입력해 주세요."); name.focus(); return; }
    if (!phone.value.trim()) { alert("⚠️ 휴대폰 번호를 입력해 주세요."); phone.focus(); return; }
    if (!addr.value.trim()) { alert("⚠️ 주소를 입력해 주세요."); addr.focus(); return; }
    if (!agree.checked) { alert("⚠️ 개인정보 동의가 필요합니다."); return; }

    FinData.add('wallets', { bankName: name.value });
    alert(`🏦 [${name.value}]님 지갑 설립 완료!`);
    clearAllInputs();
    showSection('dashboard', document.getElementById('btn-dashboard'));
}

/* =========================================================
   4. 자동 입력 및 UI 제어
   ========================================================= */

// ★ 지갑 자동 입력 (ID 불일치 해결 버전)
function autoFillInfo() {
    const n = document.getElementById('bankName');
    const p = document.getElementById('bankPhone');
    const a = document.getElementById('bankAddress');
    const c = document.getElementById('bankAgree');

    if(n) n.value = "채정석";
    if(p) p.value = "010-2828-7788";
    if(a) a.value = "전북특별자치도 전주시";
    if(c) c.checked = true;
}

function autoFillKakao() { 
    alert("💬 카카오 인증 완료! 정보가 자동으로 채워집니다."); 
    autoFillInfo(); 
}

function showSection(id, btn) {
    document.querySelectorAll('section').forEach(s => s.style.display = 'none');
    document.querySelectorAll('.nav button').forEach(b => b.classList.remove('active'));
    if(document.getElementById(id)) document.getElementById(id).style.display = 'block';
    if(btn) btn.classList.add('active');
    window.scrollTo(0, 0);
    if(id === 'mypage') FinData.updateUI();
}

function toggleQR() {
    const qr = document.getElementById('qrContainer');
    qr.style.display = (qr.style.display === 'none' || qr.style.display === '') ? 'block' : 'none';
}

function openPayment() {
    const p = document.getElementById('paymentFields');
    if(p.style.display === 'block') { closePayment(); } 
    else { p.style.display = 'block'; document.getElementById('payAmount').focus(); }
}

function closePayment() {
    document.getElementById('paymentFields').style.display = 'none';
    document.getElementById('payAmount').value = '';
}

function submitPayment() {
    const amtInput = document.getElementById('payAmount');
    const amt = parseInt(amtInput.value || 0);
    if(amt <= 0) { alert("⚠️ 금액을 입력하세요."); amtInput.focus(); return; }
    window.advertiser += Math.floor(amt * 0.7);
    window.consumer += Math.floor(amt * 0.3);
    alert("✅ 결제 반영 완료!");
    closePayment();
}

/* =========================================================
   5. 실시간 연출 (인원수 & AI 신호)
   ========================================================= */
let liveCount = parseInt(localStorage.getItem('fin_live_users_v3')) || 10000;
function startGrowth() {
    const countEl = document.getElementById('realtimeUserCount');
    if (countEl) {
        liveCount += 1;
        localStorage.setItem('fin_live_users_v3', liveCount);
        countEl.innerText = liveCount.toLocaleString();
    }
    setTimeout(startGrowth, 5000);
}

function updateAISignal() {
    const assets = ["KOSPI200", "삼성전자", "핀세계 AI", "GOLD"];
    const actions = ["매수 포착", "비중 확대", "관망"];
    if(document.getElementById('assetName')) document.getElementById('assetName').innerText = assets[Math.floor(Math.random() * assets.length)];
    if(document.getElementById('actionType')) document.getElementById('actionType').innerText = actions[Math.floor(Math.random() * actions.length)];
    setTimeout(updateAISignal, 3000);
}

window.addEventListener('load', () => {
    FinData.updateUI();
    updateAISignal();
    setTimeout(startGrowth, 2000);
});
</script>
