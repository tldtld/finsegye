<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>FINSEGYE</title>
    <link rel="stylesheet" href="style.css">
</head>
<body style="background-color: black;">

<canvas id="stars"></canvas>

<div id="statusContainer">
    <div id="reserveBox">지급준비율<br><span id="reserveValue">100.0%</span></div>
    <div id="loanBox">공유비율<br><span id="loanPercent">100.0%</span></div>
    <div id="aiBox">AI 수익률<br><span id="aiRate">+0.0%</span></div>
</div>

<div class="top-spacer"></div>
<section id="dashboard" style="display:block; padding-top: 3px; margin-top: 0px;">
    <div class="asset-wrapper" style="margin-top:10px;">
        <div class="digital">행사자<br><span id="advValue">50,000원</span></div>
        <div class="digital">소비자<br><span id="consValue">20,000원</span></div>
    </div>
    <div style="font-size:1.4em; margin:0px 0; color:gold; font-weight:bold; border-bottom:1px solid #333; padding-bottom:10px; text-align:center;">
        합계: <span id="totalValue">70,000원</span>
    </div>

    <div id="aiSignalBox" style="margin: 0px auto; padding: 8px 5px; border: 1.5px solid #ff00ff; border-radius: 8px; background: rgba(255,0,255,0.1); width: 90%; height: 60px; display: flex; flex-direction: column; justify-content: center; align-items: center;">
        <div style="font-size: 11px; color: #ff00ff; font-weight: bold; margin-bottom: 4px;">📡 AI 딥러닝 투자 포착</div>
        <div id="signalDisplay" style="display:flex; justify-content:center; align-items:center; gap:6px;">
            <div id="assetName" style="font-size: 13px; color: #fff; font-weight: bold;">시장 분석 중...</div>
            <div id="actionType" style="font-size: 10px; padding: 2px 8px; border-radius: 10px; font-weight: bold; background: #444;">대기</div>
        </div>
    </div>

    <div style="display: flex; gap: 8px; margin: 15px auto; width: 98%; align-items: flex-start;">

        <div style="flex: 1; display: flex; flex-direction: column; gap: 8px;">
            <button onclick="toggleQR()" style="width: 100%; height: 60px; background: linear-gradient(135deg, #a1c4fd, #c2e9fb); color: #222; border: none; border-radius: 12px; font-size: 0.9em; font-weight: bold; box-shadow: 0 4px 8px rgba(0,0,0,0.3); cursor: pointer;">
                🤝 공유경제참여
            </button>

            <div id="qrContainer" style="display: none; padding: 10px; background: white; border-radius: 12px; text-align: center; box-shadow: 0 0 15px rgba(161, 196, 253, 0.4);">
                <img src="https://api.qrserver.com/v1/create-qr-code/?size=100x100&data=https://finsegye.com/join" alt="QR" style="width:100%; max-width:100px; display:block; margin: 0 auto;">
                <div style="font-size:0.65em; color:#444; font-weight:bold; margin-top:5px;">카메라를 비추면<br><span style="color:#ff416c;">참여 완료!</span></div>
            </div>
        </div>

        <div style="flex: 1; display: flex; flex-direction: column; gap: 8px;">
            <button onclick="toggleLiveList()" style="width: 100%; height: 60px; background: rgba(0, 255, 204, 0.1); border: 1.5px solid #00ffcc; color: #00ffcc; border-radius: 12px; font-size: 0.9em; font-weight: bold; cursor: pointer;">
                👥 실시간참여<br><span id="realtimeUserCount" style="font-size: 0.8em; color: #fff;">0</span>명
            </button>

            <div id="liveListContainer" style="display: none; padding: 10px; background: rgba(255,255,255,0.05); border: 1px solid rgba(0,255,204,0.3); border-radius: 12px; height: 130px;">
                <div id="realtimeNameList" style="height: 100%; overflow-y: auto; font-size: 0.75em; color: #eee; line-height: 1.6; text-align: left;">
                    데이터 로딩 중...
                </div>
            </div>
        </div>

    </div> <div id="paymentBox" style="width: 98%; margin: 20px auto; position: relative; z-index: 10; background: rgba(255,255,255,0.1); border: 1.5px solid #00ffcc; border-radius: 12px; overflow: hidden; transition: all 0.3s ease; box-shadow: 0 -5px 15px rgba(0,255,204,0.2);">

    <div onclick="openPayment()" style="height: 50px; display: flex; justify-content: center; align-items: center; cursor: pointer; color: #00ffcc; font-weight: bold; font-size: 0.9em;">
        💳 실시간결제시스템
    </div>

    <div id="paymentFields" style="display: none; padding: 0px 15px 15px 15px; border-top: 1px solid rgba(0,255,204,0.3); text-align: center;">

        <input id="payAmount" type="number" placeholder="결제 금액 입력 (원)"
               style="width: 80%; padding: 12px; margin-top: -10px; border-radius: 8px; border: none; outline: none; font-size: 1.1em; text-align: center; background: #fff; color: #000; font-weight: bold;">

        <div style="margin-top: 12px; display: flex; gap: 10px; justify-content: center;">
            <button onclick="submitPayment()" style="padding: 10px 25px; background: #00ffcc; color: #000; border: none; border-radius: 8px; font-weight: bold; cursor: pointer;">완료</button>
            <button onclick="closePayment()" style="padding: 10px 25px; background: #444; color: #fff; border: none; border-radius: 8px; cursor: pointer;">취소</button>
        </div>
    </div>
</div>

    </div>

</section>

<section id="adApplyForm"><div class="form-box"><input id="shopName" type="text" placeholder="상호명"><input id="bizType" type="text" placeholder="업종/업태"><input id="area" type="text" placeholder="행사지역"><textarea id="adText" placeholder="행사문구 입력"></textarea><button class="submitBtn" onclick="submitAd()">📩 행사 신청하기</button></div></section>
<section id="loanApplyForm"><div class="form-box"><input id="loanName" type="text" placeholder="신청자명"><input id="loanAmount" type="number" placeholder="신청금액(만원)"><textarea id="loanPurpose" placeholder="공유목적 입력"></textarea><button class="submitBtn" onclick="submitLoan()">💰 공유 신청하기</button></div></section>
<section id="routineForm"><div class="form-box"><input id="routineOwner" type="text" placeholder="제작자 이름"><input id="routineRegion" type="text" placeholder="적용지역"><textarea id="routineText" placeholder="루틴 내용 입력"></textarea><button class="submitBtn" onclick="submitRoutine()">🌀 루틴 생성하기</button></div></section>

<section id="bankForm">
    <div class="form-box">
        <input id="bankName" type="text" placeholder="성명">
        <input id="bankPhone" type="tel" placeholder="전화번호">
        <input id="bankAddress" type="text" placeholder="주소">
        <div class="agree-container">
            <input type="checkbox" id="bankAgree">
            <span>개인정보 동의 (필수)</span>
        </div>
        <div style="margin-bottom:8px; font-size:11px;">
            <span onclick="alert('생산 주체인 행사자는 소비자 대비 20% 우대 배당권을 가집니다.')" style="color:#ffd700; cursor:pointer; text-decoration:underline;">이용약관</span> |
            <span onclick="alert('수집된 정보는 안전하게 사용됩니다.')" style="color:#ffd700; cursor:pointer; text-decoration:underline;">개인정보방침</span>
        </div>
        <button class="submitBtn" onclick="submitBank()">🏦 AI 지갑 설립 완료</button>

    </div>
</section>

<section id="mypage" style="display:none; padding: 0px 3px; margin-top: 20px;">
    <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 4px; margin-top: 0;">
        <div style="padding:10px 8px; background:rgba(255,255,255,0.05); border-radius:4px; border-top:2px solid gold;"><h4 style="margin:0 0 3px 0; font-size:0.75em; color:gold; letter-spacing:-0.5px;">🏦 AI 지갑설립</h4><div id="walletDisplay" style="font-size:0.75em; color:#ccc; line-height:1.2;">내역 없음</div></div>
        <div style="padding:10px 8px; background:rgba(255,255,255,0.05); border-radius:4px; border-top:2px solid #ff00ff;"><h4 style="margin:0 0 3px 0; font-size:0.75em; color:#ff00ff; letter-spacing:-0.5px;">📢 행사신청내역</h4><ul id="adListDisplay" style="margin:0; padding:0; font-size:0.72em; color:#ccc; list-style:none;">내역 없음</ul></div>
        <div style="padding:10px 8px; background:rgba(255,255,255,0.05); border-radius:4px; border-top:2px solid #ff9900;"><h4 style="margin:0 0 3px 0; font-size:0.75em; color:#ff9900; letter-spacing:-0.5px;">💰 공유신청내역</h4><ul id="loanListDisplay" style="margin:0; padding:0; font-size:0.72em; color:#ccc; list-style:none;">내역 없음</ul></div>
        <div style="padding:10px 8px; background:rgba(255,255,255,0.05); border-radius:4px; border-top:2px solid #cc99ff;"><h4 style="margin:0 0 3px 0; font-size:0.75em; color:#cc99ff; letter-spacing:-0.5px;">🌀 행사루틴내역</h4><ul id="routineListDisplay" style="margin:0; padding:0; font-size:0.72em; color:#ccc; list-style:none;">내역 없음</ul></div>
    </div>

</section>

<div class="nav">
    <button onclick="showSection('dashboard', this)" id="btn-dashboard" class="active">자산<br>현황</button>
    <button onclick="showSection('adApplyForm', this)" id="btn-adApplyForm">행사<br>신청</button>
    <button onclick="showSection('loanApplyForm', this)" id="btn-loanApplyForm">공유<br>신청</button>
    <button onclick="showSection('routineForm', this)" id="btn-routineForm">행사<br>루틴</button>
    <button onclick="showSection('bankForm', this)" id="btn-bankForm">지갑<br>설립</button>
    <button onclick="showSection('mypage', this)" id="btn-mypage">나의<br>현황</button>
</div>

<script src="ui_forms.js?v=1.1"></script>
<script src="economy.js"></script>
<script src="ui_logic.js"></script>
<script src="ui_dashboard.js"></script>

<script>
    var isMypageExpanded = false;

    // 공통 저장 함수
    function handleStorage(key, item, msg) {
        try {
            let list = JSON.parse(localStorage.getItem(key) || '[]');
            list.unshift(item);
            localStorage.setItem(key, JSON.stringify(list));
            alert(msg);
            showSection('mypage', document.getElementById('btn-mypage'));
        } catch(e) { alert("저장 오류: " + e.message); }
    }

    // 1. [행사 신청] 유효성 검사
    function submitAd() {
        const shop = document.getElementById('shopName');
        const type = document.getElementById('bizType');
        const area = document.getElementById('area');
        const text = document.getElementById('adText');

        if (!shop.value.trim()) { alert("상호명을 입력해주세요."); shop.focus(); return; }
        if (!type.value.trim()) { alert("업종/업태를 입력해주세요."); type.focus(); return; }
        if (!area.value.trim()) { alert("행사 지역이 어디인가요?"); area.focus(); return; }
        if (!text.value.trim()) { alert("행사 문구를 입력해주세요."); text.focus(); return; }

        const item = { shopName: shop.value, bizType: type.value, area: area.value, adText: text.value, date: new Date().toLocaleString() };
        handleStorage('fin_ads', item, "📢 [" + shop.value + "] 행사 신청이 완벽하게 입고되었습니다!");

        // 입력창 비우기
        [shop, type, area, text].forEach(el => el.value = "");
    }

    // 2. [공유 신청] 유효성 검사
    function submitLoan() {
        const name = document.getElementById('loanName');
        const amount = document.getElementById('loanAmount');
        const purpose = document.getElementById('loanPurpose');

        if (!name.value.trim()) { alert("신청자 성함을 입력해주세요."); name.focus(); return; }
        if (!amount.value.trim()) { alert("신청 금액을 입력해주세요."); amount.focus(); return; }
        if (!purpose.value.trim()) { alert("공유 목적을 입력해주세요."); purpose.focus(); return; }

        const item = { loanName: name.value, loanAmount: amount.value, loanPurpose: purpose.value, date: new Date().toLocaleString() };
        handleStorage('fin_loans', item, "💰 [" + name.value + "] 님 공유 신청이 완료되었습니다!");

        [name, amount, purpose].forEach(el => el.value = "");
    }

    // 3. [행사 루틴] 유효성 검사
    function submitRoutine() {
        const owner = document.getElementById('routineOwner');
        const region = document.getElementById('routineRegion');
        const text = document.getElementById('routineText');

        if (!owner.value.trim()) { alert("제작자 이름을 입력해주세요."); owner.focus(); return; }
        if (!region.value.trim()) { alert("적용 지역을 입력해주세요."); region.focus(); return; }
        if (!text.value.trim()) { alert("루틴 내용을 입력해주세요."); text.focus(); return; }

        const item = { routineOwner: owner.value, routineRegion: region.value, routineText: text.value, date: new Date().toLocaleString() };
        handleStorage('fin_routines', item, "🌀 [" + owner.value + "] 루틴 생성이 완료되었습니다!");

        [owner, region, text].forEach(el => el.value = "");
    }

    // 4. [지갑 설립] 유효성 검사 (동의 체크박스 포함)
    function submitBank() {
        const name = document.getElementById('bankName');
        const phone = document.getElementById('bankPhone');
        const address = document.getElementById('bankAddress');
        const agree = document.getElementById('bankAgree');

        if (!name.value.trim()) { alert("성함을 입력해주세요."); name.focus(); return; }
        if (!phone.value.trim()) { alert("전화번호를 입력해주세요."); phone.focus(); return; }
        if (!address.value.trim()) { alert("주소를 입력해주세요."); address.focus(); return; }
        if (!agree.checked) { alert("개인정보 동의에 체크해주셔야 설립이 가능합니다."); agree.focus(); return; }

        const item = { bankName: name.value, bankPhone: phone.value, bankAddress: address.value, date: new Date().toLocaleString() };
        handleStorage('fin_wallets', item, "🏦 [" + name.value + "] 님 AI 지갑 설립이 완료되었습니다!");

        [name, phone, address].forEach(el => el.value = "");
        agree.checked = false;
    }

    // 화면 전환 및 자동 커서
    function showSection(sectionId, btn) {
        document.querySelectorAll('section').forEach(s => s.style.display = 'none');
        document.querySelectorAll('.nav button').forEach(b => b.classList.remove('active'));

        const target = document.getElementById(sectionId);
        if(target) target.style.display = 'block';
        if(btn) btn.classList.add('active');

        // 첫 번째 칸으로 커서 이동
        if (sectionId === 'adApplyForm') document.getElementById('shopName').focus();
        if (sectionId === 'loanApplyForm') document.getElementById('loanName').focus();
        if (sectionId === 'routineForm') document.getElementById('routineOwner').focus();
        if (sectionId === 'bankForm') document.getElementById('bankName').focus();

        if(sectionId === 'mypage') isMypageExpanded = !isMypageExpanded;
        else isMypageExpanded = false;
    }

   function forceUpdateAll() {
    // 1. 현재 화면의 공유비율 값을 숫자로 가져옵니다.
    const loanPercentEl = document.getElementById('loanPercent');
    if (!loanPercentEl) return;

    const currentLoanPercent = parseFloat(loanPercentEl.innerText);

    // [핵심 로직] 공유비율이 0%가 아닐 때(즉, 0보다 클 때)는 업데이트를 멈춥니다.
    if (currentLoanPercent > 0) {
        // 이 블록이 실행되면 아래의 자산 갱신 코드를 모두 건너뜁니다.
        // 즉, 행사자, 소비자, 합계 숫자가 변하지 않고 고정됩니다.
        console.log("공유비율이 0%가 아니므로 자산 지표가 고정(잠금)되었습니다.");
        return;
    }

    // --- 여기서부터는 공유비율이 0%일 때만 실행되는 코드입니다 ---

    const config = [
        { id: 'walletDisplay', key: 'fin_wallets', nameKey: 'bankName' },
        { id: 'adListDisplay', key: 'fin_ads', nameKey: 'shopName' },
        { id: 'loanListDisplay', key: 'fin_loans', nameKey: 'loanName' },
        { id: 'routineListDisplay', key: 'fin_routines', nameKey: 'routineOwner' }
    ];

    config.forEach(cat => {
        const el = document.getElementById(cat.id);
        if(!el) return;
        let data = JSON.parse(localStorage.getItem(cat.key) || '[]');
        if(data.length > 0) {
            if(isMypageExpanded) {
                el.innerHTML = data.map(item =>
                    `<div style="border-bottom:1px solid #333; padding:5px 0; font-size:0.8em; color:#fff;">
                        ✅ ${item.date}<br>${item[cat.nameKey]}
                    </div>`
                ).join('');
            } else {
                const top = data[0];
                let shortTime = top.date.split(' ').slice(-2).join(' ');
                el.innerHTML = `<div style="color:gold; font-size:0.8em;">🕒 ${shortTime}<br>${top[cat.nameKey]} 완료</div>`;
            }
        } else {
            el.innerHTML = "<span style='color:#666;'>내역 없음</span>";
        }
    });

    const total = JSON.parse(localStorage.getItem('fin_wallets') || '[]').length;
    if(document.getElementById('realtimeUserCount')) document.getElementById('realtimeUserCount').innerText = total;
}
    setInterval(forceUpdateAll, 1000);
    window.onload = forceUpdateAll;

    // [기능 1] QR 코드 토글
function toggleQR() {
    const qr = document.getElementById('qrContainer');
    qr.style.display = (qr.style.display === 'none' || qr.style.display === '') ? 'block' : 'none';
    // 명단이 열려있다면 닫기 (선택 사항)
    document.getElementById('liveListContainer').style.display = 'none';
}

// [기능 2] 실시간 명단 토글
function toggleLiveList() {
    const list = document.getElementById('liveListContainer');
    list.style.display = (list.style.display === 'none' || list.style.display === '') ? 'block' : 'none';
    // QR이 열려있다면 닫기 (선택 사항)
    document.getElementById('qrContainer').style.display = 'none';
}

// [기능 3] 실시간 명단 업데이트 (기존 forceUpdateAll 안에 포함하거나 별도 유지)
function updateRealtimeList() {
    const data = JSON.parse(localStorage.getItem('fin_wallets') || '[]');

    // 인원수 업데이트
    const countEl = document.getElementById('realtimeUserCount');
    if(countEl) countEl.innerText = data.length;

    // 명단 리스트 업데이트
    const listEl = document.getElementById('realtimeNameList');
    if(listEl) {
        if(data.length > 0) {
            listEl.innerHTML = data.slice(0, 15).map(u =>
                `<div style="border-bottom:1px solid #333; padding:3px 0;">✅ ${u.bankName}님 설립완료</div>`
            ).join('');
        } else {
            listEl.innerHTML = "참여 내역이 없습니다.";
        }
    }
}
let isSystemPaused = false; // 시스템 정지 상태 변수



/* =========================================================
   1. 탭 제어 로직 (공유참여, 실시간참여, 결제시스템)
   ========================================================= */

// [탭 1] 공유경제참여 (QR 코드) 토글
function toggleQR() {
    const qr = document.getElementById('qrContainer');
    const liveList = document.getElementById('liveListContainer');
    const payment = document.getElementById('paymentFields');

    if (!qr) return;

    // QR 열기/닫기
    qr.style.display = (qr.style.display === 'none' || qr.style.display === '') ? 'block' : 'none';

    // 다른 탭은 닫기
    if (liveList) liveList.style.display = 'none';
    if (payment) closePayment();
}

// [탭 2] 실시간참여 (명단) 토글
function toggleLiveList() {
    const qr = document.getElementById('qrContainer');
    const liveList = document.getElementById('liveListContainer');
    const payment = document.getElementById('paymentFields');

    if (!liveList) return;

    // 명단 열기/닫기
    liveList.style.display = (liveList.style.display === 'none' || liveList.style.display === '') ? 'block' : 'none';

    // 다른 탭은 닫기
    if (qr) qr.style.display = 'none';
    if (payment) closePayment();

    // 명단 즉시 갱신
    if (typeof updateRealtimeList === "function") updateRealtimeList();
}

// [탭 3] 실시간 결제 시스템 열기
function openPayment() {
    const fields = document.getElementById('paymentFields');
    const payBox = document.getElementById('paymentBox');
    const qr = document.getElementById('qrContainer');
    const liveList = document.getElementById('liveListContainer');

    if (!fields) return;

    // 시스템 일시 정지 (economy.js와 연동)
    window.isSystemPaused = true;

    // 결제창 보이기
    fields.style.display = 'block';
    if (payBox) payBox.style.borderColor = '#ff416c';

    // 다른 탭 닫기
    if (qr) qr.style.display = 'none';
    if (liveList) liveList.style.display = 'none';

    // 입력창 포커스
    setTimeout(() => {
        const input = document.getElementById('payAmount');
        if (input) input.focus();
    }, 150);
}

// 결제창 닫기 (취소 또는 완료 시)
function closePayment() {
    const fields = document.getElementById('paymentFields');
    const payBox = document.getElementById('paymentBox');
    const payInput = document.getElementById('payAmount');

    window.isSystemPaused = false; // 시스템 재가동

    if (fields) fields.style.display = 'none';
    if (payBox) payBox.style.borderColor = '#00ffcc';
    if (payInput) payInput.value = "";
}

/* =========================================================
   2. 실시간 결제 금액 반영 알고리즘 (완성체)
   ========================================================= */

function submitPayment() {
    const payInput = document.getElementById('payAmount');
    const amount = parseInt(payInput ? payInput.value : 0);

    if (!amount || amount <= 0) {
        alert("금액을 입력해주세요.");
        if (payInput) payInput.focus();
        return;
    }

    // [데이터 주입] 원본 변수 수정 (economy.js의 window.advertiser 수정)
    const advShare = Math.floor(amount * 0.7);
    const consShare = amount - advShare;

    window.advertiser += advShare;
    window.consumer += consShare;

    // [즉시 반영] 화면 갱신 함수 호출 (economy.js에 정의된 함수)
    if (typeof renderAssetUI === "function") {
        renderAssetUI();
    } else {
        // 백업용 수동 갱신
        document.getElementById("advValue").innerText = Math.floor(window.advertiser).toLocaleString() + "원";
        document.getElementById("consValue").innerText = Math.floor(window.consumer).toLocaleString() + "원";
        document.getElementById("totalValue").innerText = Math.floor(window.advertiser + window.consumer).toLocaleString() + "원";
    }

    alert(amount.toLocaleString() + "원 결제가 완료되었습니다.\n합산된 금액에서 실시간 상승이 시작됩니다.");

    closePayment();
}

/* =========================================================
   3. 보조 기능 (명단 업데이트 등)
   ========================================================= */
function updateRealtimeList() {
    const data = JSON.parse(localStorage.getItem('fin_wallets') || '[]');
    const listEl = document.getElementById('realtimeNameList');
    if (listEl) {
        if (data.length > 0) {
            listEl.innerHTML = data.slice(0, 10).map(u => `✅ ${u.bankName} 님 설립완료`).join('<br>');
        } else {
            listEl.innerHTML = "참여 내역이 없습니다.";
        }
    }
}

// 1초마다 명단 갱신
setInterval(updateRealtimeList, 1000);

</script>
