<script>

    
/* =========================================================
   1. 핀세계 핵심 경제 엔진 (실시간 수치 연동)
   ========================================================= */
window.loanPercent = 100.0;
window.aiRate = 0.0;
window.advertiser = 50000;
window.consumer = 20000;
window.pause = false;

function updateStatus() {
    try {
        const resElem = document.getElementById("reserveValue");
        if(resElem) resElem.innerText = (98.8 + Math.random() * 1.2).toFixed(2) + "%";
        
        if(!window.pause) {
            window.loanPercent -= 0.5;
            if(window.loanPercent <= 0) {
                window.loanPercent = 0; 
                window.pause = true; 
                
                // ★ 여기가 20000(20초)으로 바뀌었습니다!
                setTimeout(() => { 
                    window.loanPercent = 100.0; 
                    window.pause = false; 
                }, 20000); 
            }
        }
        
        if(document.getElementById("loanPercent")) document.getElementById("loanPercent").innerText = window.loanPercent.toFixed(1) + "%";
        window.aiRate += 0.01;
        if(document.getElementById("aiRate")) document.getElementById("aiRate").innerText = "+" + window.aiRate.toFixed(1) + "%";
        
        // 0%일 때 자산이 20초 동안 꾸준히 증가합니다.
        if (window.loanPercent === 0) { 
            window.advertiser += 24; 
            window.consumer += 20; 
        }
        
        if(document.getElementById("advValue")) document.getElementById("advValue").innerText = Math.floor(window.advertiser).toLocaleString() + "원";
        if(document.getElementById("consValue")) document.getElementById("consValue").innerText = Math.floor(window.consumer).toLocaleString() + "원";
        if(document.getElementById("totalValue")) document.getElementById("totalValue").innerText = Math.floor(window.advertiser + window.consumer).toLocaleString() + "원";
    } catch(e) {}
}

// 0.1초마다 상태를 업데이트합니다.
setInterval(updateStatus, 100);
/* =========================================================
   2. 데이터 관리 엔진 (실시간 명단 연동 수리)
   ========================================================= */
const FinData = {
    get: (key) => JSON.parse(localStorage.getItem('fin_' + key)) || [],
    add: (key, item) => {
        let list = FinData.get(key);
        item.date = new Date().toLocaleString();
        list.unshift(item);
        localStorage.setItem('fin_' + key, JSON.stringify(list));
        FinData.updateUI(); // 장부에 적는 즉시 화면 전체 갱신
    },
    updateUI: () => {
        const draw = (key, id, label) => {
            const el = document.getElementById(id);
            if(!el) return;
            const list = FinData.get(key);
            el.innerHTML = list.length === 0 ? '<div style="color:#555; padding:10px;">내역 없음</div>' : 
                list.map(i => `<div style="border-bottom:1px solid #333; padding:8px 0; font-size:0.85em;"><b>${label}</b> ${i.bankName || i.shopName || i.loanName || i.routineOwner} <span style="font-size:0.8em; color:#666;">(${i.date})</span></div>`).join('');
        };

        // 1. 나의 현황 4개 리스트 업데이트
        draw('wallets', 'walletDisplay', '✅');
        draw('ads', 'adListDisplay', '📢');
        draw('loans', 'loanListDisplay', '💰');
        draw('routines', 'routineListDisplay', '🌀');

        // 2. [수리 핵심] 실시간 참여자 명단 업데이트
        const liveList = document.getElementById('realtimeNameList');
        if(liveList) {
            const wallets = FinData.get('wallets'); // 지갑 설립한 사람들을 가져옴
            if(wallets.length === 0) {
                liveList.innerHTML = '<div style="color:#555; text-align:center; padding:20px;">현재 접속 대기 중...</div>';
            } else {
                // 최근 참여자 50명까지만 실시간 리스트에 노출
                liveList.innerHTML = wallets.slice(0, 50).map(w => 
                    `<div style="padding:5px 0; border-bottom:1px solid rgba(0,255,204,0.1); color:#00ffcc;">
                        🚀 <b>${w.bankName}</b>님이 참여하셨습니다.
                     </div>`
                ).join('');
            }
        }
    }
};

/* =========================================================
   4. UI 연출 및 토글 기능 (실시간 명단 보기 보강)
   ========================================================= */

function toggleLiveList() {
    const q = document.getElementById('liveListContainer');
    if(q) {
        // 창을 열 때마다 최신 데이터를 다시 불러옵니다.
        const isOpening = (q.style.display === 'none' || q.style.display === '');
        q.style.display = isOpening ? 'block' : 'none';
        if(isOpening) FinData.updateUI(); 
    }
}

/* =========================================================
   3. 음성 및 안내 시스템
   ========================================================= */
/* =========================================================
   [수리] 또박또박하고 부드러운 음성 가이드 시스템
   ========================================================= */

function speak(text) {
    if ('speechSynthesis' in window) {
        window.speechSynthesis.cancel(); 
        
        const utterance = new SpeechSynthesisUtterance(text);
        utterance.lang = 'ko-KR';
        
        // 1. 속도는 0.8로 차분하게 유지
        utterance.rate = 0.7; 
        
        // 2. 목소리 톤(Pitch)을 1.1로 높여 더 명료하게 들리도록 설정
        utterance.pitch = 1.1; 
        
        window.speechSynthesis.speak(utterance);
    }
}

// 탭 전환 및 안내 통합 (쉼표를 넣어 띄어 읽기를 유도했습니다)
function showSection(id, btn) {
    // 1. AI 재테크 안내
    if (id === 'aiInvest') {
        const msg = "핀세계 딥러닝 에이아이 엔진이, 세계 최초로 개발되어 곧 공개 됩니다. 수익을 극대화 할 수 있는, 포트폴리오를 구성하고 있습니다. 잠시만 기다려 주세요.";
        alert("📈 [AI 재테크 안내]\n\n" + msg);
        speak(msg);
        return;
    }

    // 2. 국내외 주문 안내
    if (id === 'globalOrder') {
        const msg = "전 세계 가맹점과, 실시간으로 연동 중입니다. 정식 오픈이 얼마 남지 않았습니다. 기대해 주세요.";
        alert("🌐 [국내외 주문 안내]\n\n" + msg);
        speak(msg);
        return;
    }

    // 기존 섹션 이동 로직 (유지)
    document.querySelectorAll('section').forEach(s => s.style.display = 'none');
    document.querySelectorAll('.nav button').forEach(b => b.classList.remove('active'));
    
    const target = document.getElementById(id);
    if(target) {
        target.style.display = 'block';
        // 하이패스 커서 포커스
        const firstInput = target.querySelector('input:not([type="checkbox"]), textarea');
        if (firstInput) setTimeout(() => firstInput.focus(), 150);
    }
    
    if(btn) btn.classList.add('active');
    window.scrollTo(0, 0); 
    if(id === 'mypage') FinData.updateUI();
}

function startVoiceCommand() {
    const msg = "안녕하세요 핀 세계 예요 세계최초의 공유경제 메카니즘을 경험하세요. 무엇을 도와 드릴까요? 문자와 음성 모두 가능합니다. 제가 안내하는 멘트에 따라서 진행해 주시면 됩니다.";
    alert("🎙️ 음성 안내: " + msg);
    speak(msg);
}

/* =========================================================
   4. [수리 완료] 리셋 및 토글 기능
   ========================================================= */

// ★ 리셋 버튼을 누르면 이 함수가 실행되어 화면을 즉시 바꿉니다.
function resetEconomy() {
    window.advertiser = 50000; 
    window.consumer = 20000; 
    window.loanPercent = 100.0; 
    window.aiRate = 0.0;
    window.pause = false;

    // 화면 숫자 즉시 업데이트
    if(document.getElementById("advValue")) document.getElementById("advValue").innerText = "50,000원";
    if(document.getElementById("consValue")) document.getElementById("consValue").innerText = "20,000원";
    if(document.getElementById("totalValue")) document.getElementById("totalValue").innerText = "70,000원";
    if(document.getElementById("loanPercent")) document.getElementById("loanPercent").innerText = "100.0%";
    if(document.getElementById("aiRate")) document.getElementById("aiRate").innerText = "+0.0%";

    alert("🚨 자산 현황 수치가 초기 상태로 리셋되었습니다.");
}

function toggleQR() {
    const q = document.getElementById('qrContainer');
    if(q) q.style.display = (q.style.display === 'none' || q.style.display === '') ? 'block' : 'none';
}

function toggleLiveList() { const q = document.getElementById('liveListContainer'); q.style.display = (q.style.display === 'none' || q.style.display === '') ? 'block' : 'none'; }
function openPayment() { const p = document.getElementById('paymentFields'); if(p.style.display === 'block') closePayment(); else { p.style.display = 'block'; document.getElementById('payAmount').focus(); } }
function closePayment() { document.getElementById('paymentFields').style.display = 'none'; document.getElementById('payAmount').value = ''; }

/* =========================================================
   5. 입력 검증 및 기타 기능 (기존 유지)
   ========================================================= */
function clearAllInputs() { document.querySelectorAll('input, textarea').forEach(el => { if (el.type === 'checkbox') el.checked = false; else el.value = ''; }); }

function submitAd() {
    const s = document.getElementById("shopName"), b = document.getElementById("bizType"), a = document.getElementById("area"), t = document.getElementById("adText");
    if (!s.value.trim()) { alert("⚠️ 상호명을 입력해 주세요."); s.focus(); return; }
    if (!b.value.trim()) { alert("⚠️ 업종/업태를 입력해 주세요."); b.focus(); return; }
    if (!a.value.trim()) { alert("⚠️ 행사 지역을 입력해 주세요."); a.focus(); return; }
    if (!t.value.trim()) { alert("⚠️ 행사 문구를 입력해 주세요."); t.focus(); return; }
    FinData.add('ads', { shopName: s.value }); alert("📢 행사 신청 완료!"); clearAllInputs(); showSection('dashboard', document.getElementById('btn-dashboard'));
}

function submitLoan() {
    const n = document.getElementById("loanName"), m = document.getElementById("loanAmount"), p = document.getElementById("loanPurpose");
    if (!n.value.trim()) { alert("⚠️ 신청자명을 입력해 주세요."); n.focus(); return; }
    if (!m.value.trim()) { alert("⚠️ 신청 금액을 입력해 주세요."); m.focus(); return; }
    if (!p.value.trim()) { alert("⚠️ 공유 목적을 입력해 주세요."); p.focus(); return; }
    FinData.add('loans', { loanName: n.value }); alert("💰 공유 신청 완료!"); clearAllInputs(); showSection('dashboard', document.getElementById('btn-dashboard'));
}

function submitRoutine() {
    const o = document.getElementById("routineOwner"), r = document.getElementById("routineRegion"), t = document.getElementById("routineText");
    if (!o.value.trim()) { alert("⚠️ 제작자 이름을 입력해 주세요."); o.focus(); return; }
    if (!r.value.trim()) { alert("⚠️ 적용 지역을 입력해 주세요."); r.focus(); return; }
    if (!t.value.trim()) { alert("⚠️ 루틴 내용을 입력해 주세요."); t.focus(); return; }
    FinData.add('routines', { routineOwner: o.value }); alert("🌀 루틴 생성 완료!"); clearAllInputs(); showSection('dashboard', document.getElementById('btn-dashboard'));
}

function submitBank() {
    const n = document.getElementById('bankName'), p = document.getElementById('bankPhone'), a = document.getElementById('bankAddress'), g = document.getElementById('bankAgree');
    if (!n.value.trim()) { alert("⚠️ 성함을 입력해 주세요."); n.focus(); return; }
    if (!p.value.trim()) { alert("⚠️ 전화번호를 입력해 주세요."); p.focus(); return; }
    if (!a.value.trim()) { alert("⚠️ 주소를 입력해 주세요."); a.focus(); return; }
    if (!g.checked) { alert("⚠️ 개인정보 수집 동의가 필요합니다."); g.focus(); return; }
    FinData.add('wallets', { bankName: n.value }); alert(`🏦 [${n.value}]님, AI 지갑 설립 완료!`); clearAllInputs(); showSection('dashboard', document.getElementById('btn-dashboard'));
}

// 💳 [유지] 실시간 결제 완료 로직
function submitPayment() { 
    const i = document.getElementById('payAmount'); 
    const a = parseInt(i.value || 0); 
    if(a <= 0) { alert("⚠️ 금액을 입력하세요."); return; } 
    window.advertiser += Math.floor(a * 0.7); 
    window.consumer += Math.floor(a * 0.3); 
    alert("✅ 결제 완료!"); 
    closePayment(); 
}

// 🚀 [유지] 실시간 인원 증가 로직
let liveCount = 10000;
function startGrowth() { 
    const e = document.getElementById('realtimeUserCount'); 
    if (e) { 
        liveCount += 1; 
        e.innerText = liveCount.toLocaleString(); 
    } 
    setTimeout(startGrowth, 5000); 
}

// 📡 [유지] AI 딥러닝 투자 포착 로직
function updateAISignal() {
    const ast = ["KOSPI200", "삼성전자", "핀세계 AI", "GOLD"], act = ["매수 포착", "비중 확대", "관망"];
    if(document.getElementById('assetName')) document.getElementById('assetName').innerText = ast[Math.floor(Math.random() * ast.length)];
    if(document.getElementById('actionType')) document.getElementById('actionType').innerText = act[Math.floor(Math.random() * act.length)];
    setTimeout(updateAISignal, 3000);
}

// 🏁 [유지] 화면 로딩 시 초기화 실행
window.addEventListener('load', () => { 
    if(typeof FinData !== 'undefined') FinData.updateUI(); 
    updateAISignal(); 
    setTimeout(startGrowth, 2000); 
});
    
</script>
