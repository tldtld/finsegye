<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>FINSEGYE</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

<canvas id="stars"></canvas>

<div id="statusContainer">
    <div id="reserveBox">지급준비율<br><span id="reserveValue">100.0%</span></div>
    <div id="loanBox">공유비율<br><span id="loanPercent">100.0%</span></div>
    <div id="aiBox">AI 수익률<br><span id="aiRate">+0.0%</span></div>
</div>

<div class="top-spacer"></div>

<section id="dashboard" style="display:block;">
    <div class="asset-wrapper">
        <div class="digital">행사자<br><span id="advValue">0원</span></div>
        <div class="digital">소비자<br><span id="consValue">0원</span></div>
    </div>
    <div style="font-size:1.3em; margin-top:25px; color:gold; font-weight:bold;">합계: <span id="totalValue">0원</span></div>
</section>

<section id="adApplyForm">
    <div class="form-box">
        <input id="shopName" type="text" placeholder="상호명">
        <input id="bizType" type="text" placeholder="업종/업태">
        <input id="area" type="text" placeholder="행사지역">
        <textarea id="adText" placeholder="행사문구 입력"></textarea>
        <button class="submitBtn" onclick="submitAd()">📩 행사 신청하기</button>
    </div>
</section>

<section id="loanApplyForm">
    <div class="form-box">
        <input id="loanName" type="text" placeholder="신청자명">
        <input id="loanAmount" type="number" placeholder="신청금액(만원)">
        <textarea id="loanPurpose" placeholder="공유목적 입력"></textarea>
        <button class="submitBtn" onclick="submitLoan()">💰 공유 신청하기</button>
    </div>
</section>

<section id="routineForm">
    <div class="form-box">
        <input id="routineOwner" type="text" placeholder="제작자 이름">
        <input id="routineRegion" type="text" placeholder="적용지역">
        <textarea id="routineText" placeholder="루틴 내용 입력"></textarea>
        <button class="submitBtn" onclick="submitRoutine()">🌀 루틴 생성하기</button>
    </div>
</section>

<section id="bankForm">
    <div class="form-box">
        <input id="bankName" type="text" placeholder="성명">
        <input id="bankPhone" type="tel" placeholder="전화번호">
        <input id="bankAddress" type="text" placeholder="주소">
        <div class="agree-container">
            <input type="checkbox" id="bankAgree">
            <span>개인정보 동의 (필수)</span>
        </div>
        <div style="margin-bottom:8px; font-size:11px;">
            <span onclick="alert('[이용약관]\n\n생산 주체인 행사자는 소비자 대비 20%의 우대 배당권을 가집니다.')" style="color:#ffd700; cursor:pointer; text-decoration:underline;">이용약관</span> |
            <span onclick="alert('[개인정보처리방침]\n\n수집된 정보는 지갑 설립 목적으로만 안전하게 사용됩니다.')" style="color:#ffd700; cursor:pointer; text-decoration:underline;">개인정보방침</span>
        </div>
        <button class="submitBtn" onclick="submitBank()">🏦 AI 지갑 설립 완료</button>
    </div>
</section>

<div class="nav">
    <button onclick="showSection('dashboard', this)" id="btn-dashboard" class="active">자산<br>현황</button>
    <button onclick="showSection('adApplyForm', this)" id="btn-adApplyForm">행사<br>신청</button>
    <button onclick="showSection('loanApplyForm', this)" id="btn-loanApplyForm">공유<br>신청</button>
    <button onclick="showSection('routineForm', this)" id="btn-routineForm">행사<br>루틴</button>
    <button onclick="showSection('bankForm', this)" id="btn-bankForm">지갑<br>설립</button>
</div>

<script src="ui_forms.js"></script>
<script src="economy.js"></script>
<script src="ui_logic.js"></script>
<script src="ui_dashboard.js"></script>

</body>
</html>
