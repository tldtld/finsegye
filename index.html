<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>FINSEGYE</title>
    <link rel="stylesheet" href="style.css">
    <style>
        /* 모든 섹션을 기본적으로 숨김 (자산현황 제외) */
        section { display: none; padding-bottom: 80px; }
        #dashboard { display: block; }
        
        /* 하단 탭 강조 스타일 */
        .nav button.active { color: #fff !important; background: rgba(0, 255, 204, 0.2) !important; border-radius: 8px; }
        
        /* 붕붕 애니메이션 */
        @keyframes micFloating {
            0% { transform: scale(1); opacity: 0.8; }
            50% { transform: scale(2.2); opacity: 0; }
            100% { transform: scale(1); opacity: 0; }
        }
        .mic-active { display: block !important; animation: micFloating 1.2s infinite ease-out; }
    </style>
</head>
<body style="background-color: black; margin: 0; padding: 0;">

<canvas id="stars"></canvas>

<div id="statusContainer">
    <div id="reserveBox">지급준비율<br><span id="reserveValue">100.0%</span></div>
    <div id="loanBox">공유비율<br><span id="loanPercent">100.0%</span></div>
    <div id="aiBox">AI 수익률<br><span id="aiRate">+0.0%</span></div>
</div>

<div class="top-spacer" style="height: 60px;"></div>

<section id="dashboard">
    <div class="asset-wrapper" style="margin-top:10px;">
        <div class="digital">행사자<br><span id="advValue">50,000원</span></div>
        <div class="digital">소비자<br><span id="consValue">20,000원</span></div>
    </div>
    <div style="font-size:1.4em; color:gold; font-weight:bold; border-bottom:1px solid #333; padding-bottom:10px; text-align:center;">
        합계: <span id="totalValue">70,000원</span>
        <button onclick="resetEconomy()" style="font-size: 10px; color: #777; background: none; border: 1px solid #444; border-radius: 3px;">RESET</button>
    </div>

    <div id="aiSignalBox" style="margin: 10px auto; border: 1.5px solid #ff00ff; border-radius: 8px; background: rgba(255,0,255,0.1); width: 90%; height: 60px; display: flex; flex-direction: column; justify-content: center; align-items: center;">
        <div style="font-size: 11px; color: #ff00ff; font-weight: bold;">📡 AI 딥러닝 투자 포착</div>
        <div id="signalDisplay" style="display:flex; gap:6px;">
            <div id="assetName" style="color: #fff; font-weight: bold;">시장 분석 중...</div>
            <div id="actionType" style="font-size: 10px; padding: 2px 8px; border-radius: 10px; background: #444;">대기</div>
        </div>
    </div>

    <div style="display: flex; gap: 8px; margin: 15px auto; width: 98%;">
        <div style="flex: 1;">
            <button onclick="toggleQR()" style="width: 100%; height: 55px; background: linear-gradient(135deg, #a1c4fd, #c2e9fb); border: none; border-radius: 12px; font-weight: bold;">🤝 QR참여</button>
            <div id="qrContainer" style="display: none; padding: 10px; background: white; border-radius: 12px; margin-top:5px;" onclick="showSection('bankForm', document.getElementById('btn-bankForm'))">
                <img src="https://api.qrserver.com/v1/create-qr-code/?size=100x100&data=https://finsegye.com" style="width:100px;">
            </div>
        </div>
        <div style="flex: 1;">
            <button onclick="toggleLiveList()" style="width: 100%; height: 55px; background: rgba(0, 255, 204, 0.1); border: 1.5px solid #00ffcc; color: #00ffcc; border-radius: 12px; font-weight: bold;">실시간 <span id="realtimeUserCount">10,000</span>명</button>
        </div>
    </div>

    <div onclick="presentGemini()" style="width: 90%; height: 45px; margin: 10px auto; background: rgba(0, 255, 204, 0.1); border: 1.5px solid rgba(0, 255, 204, 0.5); border-radius: 10px; display: flex; align-items: center; justify-content: center; color: #fff; font-weight: bold; position: relative;">
        🎤 재미나이 상담 엔진 가동
        <span id="micPulse" style="position: absolute; width: 20px; height: 20px; background: rgba(0, 255, 204, 0.4); border-radius: 50%; display: none;"></span>
    </div>
</section>

<section id="adApplyForm"><div class="form-box"><h3>📢 행사 신청</h3><input type="text" placeholder="상호명"><button class="submitBtn">📩 신청하기</button></div></section>
<section id="loanApplyForm"><div class="form-box"><h3>💰 공유 신청</h3><input type="number" placeholder="금액(만원)"><button class="submitBtn">💰 신청하기</button></div></section>
<section id="routineForm"><div class="form-box"><h3>🌀 행사 루틴</h3><textarea placeholder="루틴 내용"></textarea><button class="submitBtn">🌀 생성하기</button></div></section>
<section id="bankForm"><div class="form-box"><h3>🏦 AI 지갑 설립</h3><input type="text" placeholder="성명"><button class="submitBtn" onclick="submitBank()">🚀 완료</button></div></section>
<section id="mypage"><div style="padding: 20px; color: gold; text-align: center;">🏦 나의 현황 정보를 조회 중입니다.</div></section>

<div class="nav" style="position: fixed !important; bottom: 0 !important; left: 0 !important; width: 100% !important; height: 70px !important; background: #000 !important; display: flex !important; align-items: center !important; z-index: 9999999 !important; border-top: 1px solid #333 !important; padding-bottom: env(safe-area-inset-bottom) !important;">
    <button onclick="showSection('dashboard', this)" id="btn-dashboard" class="active" style="flex:1; background:none; border:none; color:gold; font-size:11px;">자산<br>현황</button>
    <button onclick="showSection('adApplyForm', this)" id="btn-adApplyForm" style="flex:1; background:none; border:none; color:gold; font-size:11px;">행사<br>신청</button>
    <button onclick="showSection('loanApplyForm', this)" id="btn-loanApplyForm" style="flex:1; background:none; border:none; color:gold; font-size:11px;">공유<br>신청</button>
    <button onclick="showSection('routineForm', this)" id="btn-routineForm" style="flex:1; background:none; border:none; color:gold; font-size:11px;">행사<br>루틴</button>
    <button onclick="showSection('bankForm', this)" id="btn-bankForm" style="flex:1; background:none; border:none; color:gold; font-size:11px;">지갑<br>설립</button>
    <button onclick="showSection('mypage', this)" id="btn-mypage" style="flex:1; background:none; border:none; color:gold; font-size:11px;">나의<br>현황</button>
</div>

<script>
// [1] 원스토어 검증관의 '반려'를 해결할 핵심 함수
function showSection(sectionId, btn) {
    // 1. 모든 섹션을 예외 없이 숨김
    const sections = document.querySelectorAll('section');
    sections.forEach(s => { s.style.display = 'none'; });

    // 2. 모든 버튼의 활성화 표시 제거
    const buttons = document.querySelectorAll('.nav button');
    buttons.forEach(b => { b.classList.remove('active'); });

    // 3. 선택된 섹션만 강제로 노출
    const target = document.getElementById(sectionId);
    if(target) {
        target.style.display = 'block';
        window.scrollTo(0, 0); // 화면 맨 위로 정렬
    }
    
    // 4. 클릭한 버튼 불 들어오게 하기
    if(btn) btn.classList.add('active');
}

// [2] 재미나이 상담 엔진
function presentGemini() {
    const SpeechRecognition = window.SpeechRecognition || window.webkitSpeechRecognition;
    const micPulse = document.getElementById('micPulse');
    if (!SpeechRecognition) { alert("크롬 브라우저를 이용해 주세요."); return; }
    const recognition = new SpeechRecognition();
    recognition.lang = 'ko-KR';
    const speak = (t) => { window.speechSynthesis.cancel(); const m = new SpeechSynthesisUtterance(t); m.lang='ko-KR'; window.speechSynthesis.speak(m); };
    recognition.onstart = () => { micPulse.classList.add('mic-active'); speak("재미나이가 가동되었습니다."); };
    recognition.onresult = (e) => { micPulse.classList.remove('mic-active'); speak("네 대표님, 무엇을 도와드릴까요?"); };
    recognition.start();
}

function toggleQR() { const q = document.getElementById('qrContainer'); q.style.display = q.style.display==='none'?'block':'none'; }
function toggleLiveList() { alert("실시간 참여 인원 데이터를 갱신합니다."); }
function submitBank() { alert("🏦 AI 지갑 설립이 완료되었습니다!"); showSection('dashboard', document.getElementById('btn-dashboard')); }
</script>
</body>
</html>
