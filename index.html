function submitPayment() {
    const payInput = document.getElementById('payAmount');
    const amount = parseInt(payInput.value || 0);

    // 1. 유효성 검사
    if (amount <= 0) { 
        alert("금액을 입력해주세요."); 
        payInput.focus();
        return; 
    }

        document.getElementById("consValue").innerText = Math.floor(consumer).toLocaleString() + "원";
    if (document.getElementById("totalValue")) 
        document.getElementById("totalValue").innerText = Math.floor(advertiser + consumer).toLocaleString() + "원";

    // 4. 완료 알림 및 창 닫기
    alert(amount.toLocaleString() + "원 결제가 완료되어 자산에 반영되었습니다!");
    closePayment();

<script>
/* =========================================================
   1. 핀세계 통합 자산 엔진 (모든 숫자의 심장)
   ========================================================= */
window.loanPercent = 100.0;
window.aiRate = 0.0;
window.advertiser = window.advertiser || 50000; 
window.consumer = window.consumer || 20000;     
window.decreasing = true;
window.pause = false;

function updateStatus() {
    try {
        // [디지털 숫자 움직임]
        if(document.getElementById("reserveValue")) 
            document.getElementById("reserveValue").innerText = (98.8 + Math.random() * 1.2).toFixed(2) + "%";

        if(!window.pause) {
            window.loanPercent -= 0.5;
            if(window.loanPercent <= 0) {
                window.loanPercent = 0; window.pause = true;
                setTimeout(() => { window.loanPercent = 100.0; window.pause = false; }, 5000);
            }
        }
        if(document.getElementById("loanPercent")) document.getElementById("loanPercent").innerText = window.loanPercent.toFixed(1) + "%";

        window.aiRate += (Math.random() * 0.01);
        if(document.getElementById("aiRate")) document.getElementById("aiRate").innerText = "+" + window.aiRate.toFixed(1) + "%";

        // [수익 배분 알고리즘: 0%일 때 상승]
        if (window.loanPercent === 0) { 
            window.advertiser += 24; 
            window.consumer += 20; 
        }

        // [자산 현황판 실시간 출력]
        if(document.getElementById("advValue")) document.getElementById("advValue").innerText = Math.floor(window.advertiser).toLocaleString() + "원";
        if(document.getElementById("consValue")) document.getElementById("consValue").innerText = Math.floor(window.consumer).toLocaleString() + "원";
        if(document.getElementById("totalValue")) document.getElementById("totalValue").innerText = Math.floor(window.advertiser + window.consumer).toLocaleString() + "원";
    } catch(e) { /* 에러 방어막 */ }
}
if (window.finEngine) clearInterval(window.finEngine);
window.finEngine = setInterval(updateStatus, 100);

/* =========================================================
   2. 나의 현황 데이터 엔진 (무제한 저장 및 출력)
   ========================================================= */
const FinData = {
    get: (key) => JSON.parse(localStorage.getItem('fin_' + key)) || [],
    add: (key, item) => {
        let list = FinData.get(key);
        item.date = new Date().toLocaleString();
        list.unshift(item); // 최신이 맨 위로
        localStorage.setItem('fin_' + key, JSON.stringify(list));
        FinData.updateUI(); // 즉시 화면 갱신
    },
    updateUI: () => {
        const draw = (key, id, label) => {
            const el = document.getElementById(id);
            if(el) {
                const list = FinData.get(key);
                // 모든 내역 출력 (HTML의 height와 overflow-y 설정으로 스크롤 작동)
                el.innerHTML = list.map(i => `<div style="border-bottom:1px solid #333; padding:8px 0; font-size:0.85em;"><b>${label}</b> ${i.bankName || i.shopName || i.loanName || '내역'} <br><small style="color:#666;">${i.date}</small></div>`).join('');
            }
        };
        draw('wallets', 'walletDisplay', '✅');
        draw('ads', 'adListDisplay', '📢');
        draw('loans', 'loanListDisplay', '💰');
        draw('routines', 'routineListDisplay', '🌀');
    }
};

/* =========================================================
   3. 모든 버튼 및 UI 기능 (결제, 지갑설립, 탭전환)
   ========================================================= */
function showSection(id, btn) {
    document.querySelectorAll('section').forEach(s => s.style.display = 'none');
    document.querySelectorAll('.nav button').forEach(b => b.classList.remove('active'));
    if(document.getElementById(id)) document.getElementById(id).style.display = 'block';
    if(btn) btn.classList.add('active');
    window.scrollTo(0, 0);
    if(id === 'mypage') FinData.updateUI(); // 나의 현황 탭 클릭 시 즉시 갱신
}

function submitPayment() {
    const amt = parseInt(document.getElementById('payAmount').value || 0);
    if(amt <= 0) return alert("금액을 입력하세요.");
    window.advertiser += Math.floor(amt * 0.7);
    window.consumer += Math.floor(amt * 0.3);
    alert(amt.toLocaleString() + "원 결제가 자산에 반영되었습니다!");
    closePayment();
}

function submitBank() {
    const name = document.getElementById('bankName').value;
    if(!name.trim()) return alert("성함을 입력하세요.");
    FinData.add('wallets', { bankName: name });
    alert("🏦 " + name + "님, 핀세계 지갑 설립을 축하합니다!");
    showSection('dashboard', document.getElementById('btn-dashboard'));
}

// 부가 기능 (QR, 결제창 토글)
function toggleQR() { const q = document.getElementById('qrContainer'); q.style.display = (q.style.display === 'none' ? 'block' : 'none'); }
function openPayment() { document.getElementById('paymentFields').style.display = 'block'; }
function closePayment() { document.getElementById('paymentFields').style.display = 'none'; }

// 초기 가동
window.addEventListener('load', () => {
    FinData.updateUI();
    if(typeof updateAISignal === "function") updateAISignal();
});
</script>
